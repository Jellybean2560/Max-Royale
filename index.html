<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#e8b84b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Max Royale">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Max Royale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223a;
    --surface3: #2a2a45;
    --accent: #e8b84b;
    --accent2: #f4d03f;
    --blue: #4a9eff;
    --green: #2ecc71;
    --red: #e74c3c;
    --purple: #9b59b6;
    --text: #e8e8f0;
    --muted: #888899;
    --border: #33334d;
    --nav-h: 64px;
    --radius: 12px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; }
  #content { flex: 1; overflow-y: auto; padding-bottom: var(--nav-h); }
  .screen { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── Bottom Nav ── */
  #nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 11px; cursor: pointer; transition: color .2s; padding: 0; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── Typography ── */
  h1, h2, h3 { font-family: 'Rajdhani', sans-serif; font-weight: 700; }
  h1 { font-size: 28px; }
  h2 { font-size: 22px; }
  h3 { font-size: 18px; }

  /* ── Cards / Surfaces ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-sm { background: var(--surface2); border-radius: 8px; padding: 12px; margin-bottom: 8px; }

  /* ── Inputs ── */
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 10px 12px; outline: none; transition: border-color .2s; }
  input:focus, select:focus { border-color: var(--accent); }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field { margin-bottom: 14px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s, transform .1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface3); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Tags / Badges ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-gold { background: #3d2f00; color: var(--accent); }
  .badge-blue { background: #002244; color: var(--blue); }
  .badge-green { background: #003322; color: var(--green); }
  .badge-red { background: #330011; color: var(--red); }
  .badge-purple { background: #220033; color: var(--purple); }

  /* ── Progress bar ── */
  .progress-wrap { background: var(--surface3); border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 4px; transition: width .4s; }

  /* ── Tabs ── */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── Stat row ── */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); font-size: 14px; }
  .stat-value { font-weight: 600; }

  /* ── Loading / Error states ── */
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); background: #330011; border: 1px solid var(--red); border-radius: 8px; padding: 12px; margin: 12px 0; font-size: 14px; }
  .empty-msg { color: var(--muted); text-align: center; padding: 40px 0; font-size: 14px; }


  /* ── Calculator ── */
  .calc-result { background: var(--surface2); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
  .calc-result h3 { color: var(--accent); margin-bottom: 12px; }
  .level-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .level-table th { text-align: left; color: var(--muted); padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 500; }
  .level-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); }
  .level-table tr:last-child td { border-bottom: none; }
  .level-table .highlight td { color: var(--accent); font-weight: 600; }
  .totals-box { margin-top: 14px; background: var(--surface3); border-radius: 8px; padding: 12px; }

  /* ── Card picker dropdown ── */
  .dropdown-wrap { position: relative; }
  .dropdown-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 200; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto; display: none; }
  .dropdown-list.open { display: block; }
  .dropdown-item { padding: 9px 12px; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .dropdown-item:hover { background: var(--surface3); }
  .dropdown-item .rarity-tag { font-size: 11px; color: var(--muted); }

  /* ── Player / Clan lookup ── */
  .lookup-header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .player-name { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; }
  .player-tag { color: var(--muted); font-size: 13px; font-family: monospace; }
  .trophies { display: block; margin-top: 6px; font-size: 13px; color: var(--muted); }

  /* ── Card grid ── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
  .card-item { background: var(--surface2); border-radius: 8px; padding: 10px 8px; text-align: center; border: 1px solid var(--border); }
  .card-item.maxed { border-color: var(--accent); }
  .card-item.upgradable { border-color: var(--green); }
  .card-item .card-name { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.3; }
  .card-item .card-level { font-size: 13px; font-weight: 700; }
  .card-item .card-count { font-size: 11px; color: var(--muted); }

  /* ── Battle log ── */
  .battle-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .battle-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .battle-result { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; }
  .battle-result.win { color: var(--green); }
  .battle-result.loss { color: var(--red); }
  .battle-result.draw { color: var(--muted); }
  .battle-mode { font-size: 12px; color: var(--muted); }
  .battle-crowns { font-size: 13px; }
  .deck-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .deck-card-chip { display: inline-flex; align-items: center; justify-content: center; background: var(--surface3); border-radius: 4px; width: 38px; height: 46px; overflow: hidden; flex-shrink: 0; }
  .deck-card-chip img { width: 100%; height: 100%; object-fit: contain; }
  .deck-card-chip.text-chip { width: auto; height: auto; padding: 3px 7px; font-size: 10px; }

  /* ── Deck builder ── */
  .deck-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .deck-stats { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .deck-stat { text-align: center; }
  .deck-stat .val { font-size: 20px; font-weight: 700; font-family: 'Rajdhani', sans-serif; }
  .deck-stat .lbl { font-size: 11px; color: var(--muted); }
  .winrate-bar { margin: 8px 0; }

  /* ── Achievements ── */
  .ach-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .ach-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .ach-name { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700; }
  .ach-stars { color: var(--accent); font-size: 16px; letter-spacing: 2px; }
  .ach-info { font-size: 13px; color: var(--muted); margin-bottom: 8px; }

  /* ── Clan ── */
  .clan-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .clan-name { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; }
  .clan-desc { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .member-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
  .member-name { font-weight: 600; font-size: 14px; }
  .member-role { font-size: 11px; color: var(--muted); text-transform: capitalize; }
  .member-stats { text-align: right; font-size: 13px; }

  /* ── Sort / Filter bar ── */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .filter-btn.active { background: var(--surface3); color: var(--text); border-color: var(--accent); }

  /* ── Misc ── */
  .flex-row { display: flex; align-items: center; gap: 10px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .mt8 { margin-top: 8px; }
  .mt16 { margin-top: 16px; }
  .mb8 { margin-bottom: 8px; }
  .text-accent { color: var(--accent); }
  .text-muted { color: var(--muted); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-blue { color: var(--blue); }
  .monospace { font-family: monospace; }
</style>
</head>
<body>
<div id="app">
  <div id="content">

    <!-- ═══════════════ CALCULATOR ═══════════════ -->
    <div id="screen-calc" class="screen">
      <h2 style="margin-bottom:16px">🧮 Upgrade Calculator</h2>

      <div class="card">
        <div class="field">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label style="margin:0">Card Lookup</label>
            <button onclick="resetCalculator()" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:11px;font-family:'Inter',sans-serif;cursor:pointer">↺ Reset</button>
          </div>
          <div class="dropdown-wrap" style="margin-top:6px">
            <input type="text" id="card-search" placeholder="Type card name…" oninput="onCardSearch(this.value)" autocomplete="off">
            <div class="dropdown-list" id="card-dropdown"></div>
          </div>
          <div id="card-lookup-note" style="display:none;font-size:12px;color:var(--accent);margin-top:6px"></div>
        </div>
        <div class="field">
          <label>Rarity</label>
          <select id="calc-rarity">
            <option value="common">Common</option>
            <option value="rare">Rare</option>
            <option value="epic">Epic</option>
            <option value="legendary">Legendary</option>
            <option value="champion">Champion</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field">
            <label>Current Level</label>
            <input type="number" id="calc-current" min="1" max="16" value="1" oninput="calcUpdate()">
          </div>
          <div class="field">
            <label>Cards Owned</label>
            <input type="number" id="calc-count" min="0" value="0" oninput="calcUpdate()">
          </div>
        </div>
        <div class="field">
          <label>Target Level</label>
          <input type="number" id="calc-target" min="2" max="16" value="16" oninput="calcUpdate()">
        </div>
      </div>

      <div id="calc-result"></div>
    </div>

    <!-- ═══════════════ PLAYER LOOKUP ═══════════════ -->
    <div id="screen-lookup" class="screen active">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:relative">
        <h2 style="margin:0">🔍 Player Lookup</h2>
        <button id="accounts-btn" onclick="toggleAccountsMenu(event)" style="display:none;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:16px;padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer">👤 Accounts ▾</button>
        <div id="saved-accounts" style="display:none;position:absolute;right:0;top:100%;margin-top:6px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;min-width:200px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,0.4)"></div>
      </div>
      <div class="card">
        <div class="field" style="margin-bottom:0">
          <label>Player Tag</label>
          <div class="flex-row">
            <input type="text" id="player-tag" placeholder="#ABC123" style="flex:1" onkeydown="if(event.key==='Enter')loadPlayer()">
            <button class="btn btn-primary" onclick="loadPlayer()">Search</button>
          </div>
        </div>
      </div>
      <div id="player-result">
        <div style="text-align:center;padding:48px 0 32px">
          <img src="icon.png" alt="Max Royale" style="width:120px;height:120px;margin-bottom:20px">
          <div style="font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;color:var(--accent);letter-spacing:1px">Max Royale</div>
          <div style="font-size:13px;color:var(--muted);margin-top:6px">Enter a player tag above to get started</div>
        </div>
      </div>
    </div>

    <!-- ═══════════════ CLAN LOOKUP ═══════════════ -->
    <div id="screen-clan" class="screen">
      <h2 style="margin-bottom:16px">🛡 Clan Lookup</h2>
      <div class="card">
        <div class="field" style="margin-bottom:0">
          <label>Clan Tag</label>
          <div class="flex-row">
            <input type="text" id="clan-tag" placeholder="#ABC123" style="flex:1" onkeydown="if(event.key==='Enter')loadClan()">
            <button class="btn btn-primary" onclick="loadClan()">Search</button>
          </div>
        </div>
      </div>
      <div id="clan-result"></div>
    </div>

    <!-- ═══════════════ DECK UPGRADE ═══════════════ -->
    <div id="screen-deckup" class="screen"></div>

    <!-- ═══════════════ FRIENDS ═══════════════ -->
    <div id="screen-friends" class="screen">
      <h2 style="margin-bottom:16px">👥 Friends</h2>
      <div class="card">
        <div class="field" style="margin-bottom:0">
          <label>Add Friend (Player Tag)</label>
          <div class="flex-row">
            <input type="text" id="friend-tag" placeholder="#ABC123" style="flex:1" onkeydown="if(event.key==='Enter')addFriend()">
            <button class="btn btn-primary" onclick="addFriend()">Add</button>
          </div>
          <div id="friend-msg" style="display:none;font-size:12px;margin-top:6px"></div>
        </div>
      </div>
      <div id="friends-list"></div>
    </div>

  </div><!-- /content -->

  <!-- ═══════════════ BOTTOM NAV ═══════════════ -->
  <nav id="nav">
    <button class="nav-btn active" id="nav-lookup" onclick="goTo('lookup')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Player
    </button>
    <button class="nav-btn" id="nav-calc" onclick="goTo('calc')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
      Calculator
    </button>
    <button class="nav-btn" id="nav-deckup" onclick="goTo('deckup')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 7 8 12 3 17"/><polyline points="21 7 16 12 21 17"/><line x1="10" y1="5" x2="14" y2="19"/></svg>
      Deck Upgrade
    </button>
    <button class="nav-btn" id="nav-clan" onclick="goTo('clan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clan
    </button>
    <button class="nav-btn" id="nav-friends" onclick="goTo('friends')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Friends
    </button>
  </nav>

  <!-- ═══════════════ FRIEND PROFILE MODAL ═══════════════ -->
  <div id="friend-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);overflow-y:auto" onclick="if(event.target===this)closeFriendModal()">
    <div style="max-width:560px;margin:20px auto;background:var(--bg);border:1px solid var(--border);border-radius:14px;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1">
        <span style="font-weight:700;font-family:'Rajdhani',sans-serif;font-size:18px">Friend Profile</span>
        <button onclick="closeFriendModal()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:18px;line-height:1">×</button>
      </div>
      <div id="friend-modal-body" style="padding:16px"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  UPGRADE DATA
// ═══════════════════════════════════════════════
// Index 0 = upgrade from minLevel to minLevel+1
const LEVEL_DATA = {
  common: [
    {cards:2,    gold:5},      // 1→2
    {cards:4,    gold:20},     // 2→3
    {cards:10,   gold:50},     // 3→4
    {cards:20,   gold:150},    // 4→5
    {cards:50,   gold:400},    // 5→6
    {cards:100,  gold:1000},   // 6→7
    {cards:200,  gold:2000},   // 7→8
    {cards:400,  gold:4000},   // 8→9
    {cards:800,  gold:8000},   // 9→10
    {cards:1000, gold:15000},  // 10→11
    {cards:1500, gold:25000},  // 11→12
    {cards:2500, gold:40000},  // 12→13
    {cards:3500, gold:60000},  // 13→14
    {cards:5500, gold:90000},  // 14→15
    {cards:7500, gold:120000}, // 15→16
  ],
  rare: [
    {cards:2,    gold:50},     // 3→4
    {cards:4,    gold:150},    // 4→5
    {cards:10,   gold:400},    // 5→6
    {cards:20,   gold:1000},   // 6→7
    {cards:50,   gold:2000},   // 7→8
    {cards:100,  gold:4000},   // 8→9
    {cards:200,  gold:8000},   // 9→10
    {cards:300,  gold:15000},  // 10→11
    {cards:400,  gold:25000},  // 11→12
    {cards:550,  gold:40000},  // 12→13
    {cards:750,  gold:60000},  // 13→14
    {cards:1000, gold:90000},  // 14→15
    {cards:1400, gold:120000}, // 15→16

const XP_DATA = {
  common:    [4,5,6,10,25,50,100,200,400,600,800,1600,2000,50000,200000],
  rare:      [6,10,25,50,100,200,400,600,800,1600,2000,50000,200000],
  epic:      [25,100,200,400,600,800,1600,2000,50000,200000],
  legendary: [250,600,800,1600,2000,50000,200000],
  champion:  [800,1600,2000,50000,200000],
};

const MIN_LEVEL = { common:1, rare:3, epic:6, legendary:9, champion:11 };
const MAX_LEVEL = 16;

// King Tower Level requirements (May 2026 update)
const KTL_REQ = [
  {lvl:2, need:9, min:1},{lvl:3, need:9, min:2},{lvl:4, need:10, min:3},
  {lvl:5, need:10, min:4},{lvl:6, need:10, min:5},{lvl:7, need:10, min:6},
  {lvl:8, need:10, min:7},{lvl:9, need:10, min:8},{lvl:10, need:10, min:9},
  {lvl:11, need:10, min:10},{lvl:12, need:11, min:11},{lvl:13, need:11, min:12},
  {lvl:14, need:12, min:13},{lvl:15, need:13, min:14},{lvl:16, need:14, min:15}
];
function calcKingTowerLevel(dispLevels) {
  let ktl = 1;
  for (const r of KTL_REQ) {
    if (dispLevels.filter(l => l >= r.min).length >= r.need) ktl = r.lvl;
    else break;
  }
  return ktl;
}
function nextCLMilestone(cl) {
  if (cl < 20) return 20;
  if (cl >= 1500) return Math.ceil((cl + 1) / 5) * 5;
  return Math.ceil((cl + 1) / 10) * 10;
}

function toDisplayLevel(rarity, apiLevel) {
  return apiLevel + (MIN_LEVEL[rarity] || 1) - 1;
}

// XP earned so far (sum of XP for all upgrades already done, i.e. minLevel → dispLevel)
function xpEarned(rarity, dispLevel) {
  const xp = XP_DATA[rarity] || [];
  const minL = MIN_LEVEL[rarity] || 1;
  let total = 0;
  for (let i = 0; i < dispLevel - minL && i < xp.length; i++) total += xp[i];
  return total;
}

// XP still available from dispLevel → 16
function xpToMax(rarity, dispLevel) {
  const xp = XP_DATA[rarity] || [];
  const minL = MIN_LEVEL[rarity] || 1;
  let total = 0;
  for (let i = dispLevel - minL; i < xp.length; i++) total += xp[i];
  return total;
}

// Cards still needed (beyond what's owned) to fully upgrade to level 16
function cardsNeededToMax(rarity, dispLevel, ownedCount) {
  const steps = LEVEL_DATA[rarity] || [];
  const minL = MIN_LEVEL[rarity] || 1;
  let needed = 0, remaining = ownedCount;
  for (let lv = dispLevel; lv < MAX_LEVEL; lv++) {
    const idx = lv - minL;
    if (idx < 0 || idx >= steps.length) break;
    const req = steps[idx].cards;
    if (remaining >= req) { remaining -= req; }
    else { needed += req - remaining; remaining = 0; }
  }
  return needed; // 0 = can max right now
}

function computeUpgrade(rarity, currentLevel, currentCount, targetLevel) {
  const data = LEVEL_DATA[rarity];
  const minL = MIN_LEVEL[rarity];
  const results = [];
  let cardsLeft = currentCount;
  let totalCards = 0, totalGold = 0;

  for (let lvl = currentLevel; lvl < targetLevel; lvl++) {
    const idx = lvl - minL;
    if (idx < 0 || idx >= data.length) break;
    const step = data[idx];
    const need = Math.max(0, step.cards - cardsLeft);
    totalCards += need;
    totalGold += step.gold;
    cardsLeft = Math.max(0, cardsLeft - step.cards);
    results.push({ from: lvl, to: lvl + 1, cardsNeeded: need, gold: step.gold, cardsRequired: step.cards });
  }
  return { steps: results, totalCards, totalGold };
}

async function apiGet(path) {
  const cleanPath = path.replace(/#/g, '%23');
  const url = `https://quiet-frost-f9f0.jellevandenwouwer.workers.dev${cleanPath}`;
  let res;
  try {
    res = await fetch(url);
  } catch(e) {
    throw new Error('Connection failed — check your internet connection and try again.');
  }
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    let msg = '';
    try { msg = JSON.parse(txt).message; } catch(e) { msg = txt.slice(0, 300); }
    throw new Error(`API error ${res.status}${msg ? ': ' + msg : ''}`);
  }
  return res.json();
}

function fmtNum(n) { return n == null ? '—' : n.toLocaleString(); }

function formatBattleTime(ts) {
  if (!ts) return '';
  const y = ts.slice(0,4), mo = ts.slice(4,6), d = ts.slice(6,8);
  const h = ts.slice(9,11), mi = ts.slice(11,13), s = ts.slice(13,15);
  const date = new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}Z`);
  const diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

async function maybeLoadCards() {

function selectCard(id) {
  // Regular card from catalog, or tower troop from the loaded player
  const card = allCards.find(c => c.id === id) || _playerCardsById[id];
  if (!card) return;
  document.getElementById('card-search').value = card.name;
  document.getElementById('card-dropdown').classList.remove('open');

  let r = (card.rarity || '').toLowerCase();
  if (!LEVEL_DATA[r]) r = 'common';
  document.getElementById('calc-rarity').value = r;

  // If we have this player's card data, auto-fill their actual level + card count
  const pc = _playerCardsById[id];
  const note = document.getElementById('card-lookup-note');
  if (pc) {
    const disp = toDisplayLevel((pc.rarity || r || 'common').toLowerCase(), pc.level);
    document.getElementById('calc-current').value = disp;
    document.getElementById('calc-count').value = pc.count || 0;
    document.getElementById('calc-target').value = MAX_LEVEL;
    if (note) { note.textContent = `Loaded your ${card.name}: Level ${disp}, ${fmtNum(pc.count||0)} cards`; note.style.display = 'block'; }

    note.textContent = 'Tip: look up your player profile first to auto-load your card levels.';

  calcUpdate();
}

document.addEventListener('click', e => {

function calcUpdate() {
  const rarity = document.getElementById('calc-rarity').value;
  const current = parseInt(document.getElementById('calc-current').value) || 1;
  const count = parseInt(document.getElementById('calc-count').value) || 0;
  const target = parseInt(document.getElementById('calc-target').value) || 16;
  const minL = MIN_LEVEL[rarity];
  const maxL = minL + LEVEL_DATA[rarity].length;

  const clampedCurrent = Math.max(minL, Math.min(maxL - 1, current));
  const clampedTarget = Math.max(clampedCurrent + 1, Math.min(maxL, target));

  const { steps, totalCards, totalGold } = computeUpgrade(rarity, clampedCurrent, count, clampedTarget);

  const rows = steps.map(s =>
    `<tr>
      <td>${s.from}→${s.to}</td>
      <td>${s.cardsRequired.toLocaleString()}</td>
      <td class="${s.cardsNeeded > 0 ? 'text-red' : 'text-green'}">${s.cardsNeeded > 0 ? '+'+s.cardsNeeded.toLocaleString() : '✓'}</td>
      <td>${s.gold ? s.gold.toLocaleString() : '—'}</td>
    </tr>`
  ).join('');

  // Find the icon for the currently-searched card (regular cards or tower troops)
  const searchName = (document.getElementById('card-search').value || '').trim().toLowerCase();
  let cardIcon = '';
  if (searchName) {
    const cat = allCards.find(c => (c.name||'').toLowerCase() === searchName);
    cardIcon = cat?.iconUrls?.medium
      || Object.values(_playerCardsById).find(c => (c.name||'').toLowerCase() === searchName)?.iconUrls?.medium
      || '';
  }

  const html = `
    <div class="calc-result">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <h3 style="margin:0">Upgrade Path: ${rarity.charAt(0).toUpperCase()+rarity.slice(1)} ${clampedCurrent} → ${clampedTarget}</h3>
        ${cardIcon ? `<img src="${cardIcon}" alt="" style="width:48px;height:58px;object-fit:contain;flex-shrink:0">` : ''}
      </div>
      <table class="level-table">
        <thead><tr><th>Level</th><th>Cards req.</th><th>Need</th><th>Gold</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="totals-box mt8">
        <div class="flex-between">
          <span class="text-muted">Total cards needed</span>
          <strong class="${totalCards > 0 ? 'text-red' : 'text-green'}">${totalCards > 0 ? '+'+totalCards.toLocaleString() : '✓ Enough cards'}</strong>
        </div>
        <div class="flex-between mt8">
          <span class="text-muted">Total gold needed</span>
          <strong class="text-accent">${totalGold.toLocaleString()} 💰</strong>
        </div>
      </div>
    </div>`;

  document.getElementById('calc-result').innerHTML = html;
}

document.getElementById('calc-rarity').addEventListener('change', () => {
  const rarity = document.getElementById('calc-rarity').value;
  const minL = MIN_LEVEL[rarity];
  const maxL = minL + LEVEL_DATA[rarity].length;
  document.getElementById('calc-current').value = minL;
  document.getElementById('calc-target').value = maxL;
  calcUpdate();
});

async function loadPlayer(tagOverride) {
  const raw = (tagOverride || document.getElementById('player-tag').value).trim();
  if (!raw) return;
  const tag = raw.startsWith('#') ? raw : '#' + raw;
  // Save tag so it survives page reload
  localStorage.setItem('cr_player_tag', tag);
  document.getElementById('player-tag').value = tag;
  const el = document.getElementById('player-result');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const [data, battles] = await Promise.all([
      apiGet('/players/' + encodeURIComponent(tag)),
      apiGet('/players/' + encodeURIComponent(tag) + '/battlelog').catch(() => []),
      maybeLoadCards()
    ]);
    renderProfile(data, battles);
    // Save this account (name + tag) so the user can switch between accounts
    saveAccount(data.tag, data.name);
    // Cache this player's cards (+ tower troops) for the calculator's Card Lookup
    _playerCardsById = {};
    [...(data.cards || []), ...(data.supportCards || [])].forEach(c => {
      _playerCardsById[c.id] = c;
    });
    // Persist the full profile so we can render instantly on next app open
    saveProfileCache(data.tag, data, battles);
    window._currentProfile = { data, battles };
    // Auto-fill and auto-load the clan from the player's clan tag
    if (data.clan?.tag) {
      document.getElementById('clan-tag').value = data.clan.tag;
      loadClan();
    }
  } catch(e) {
    el.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

// ── Profile cache (per-tag, lets us render instantly on startup) ──
function saveProfileCache(tag, data, battles) {
  try { localStorage.setItem('cr_profile_cache', JSON.stringify({ tag, data, battles, savedAt: Date.now() })); } catch(e) {}
}
function loadProfileCache(tag) {
  try {
    const c = JSON.parse(localStorage.getItem('cr_profile_cache') || 'null');
    return (c && c.tag === tag) ? c : null;
  } catch(e) { return null; }
}
function renderProfileFromCache(cached) {
  renderProfile(cached.data, cached.battles);
  window._currentProfile = { data: cached.data, battles: cached.battles };
  _playerCardsById = {};
  [...(cached.data.cards || []), ...(cached.data.supportCards || [])].forEach(c => { _playerCardsById[c.id] = c; });

function esc(str) {

// ── Upgrade Planner ──
const RARITY_DISPLAY_NAME = { common:'Common', rare:'Rare', epic:'Epic', legendary:'Legendary', champion:'Champion' };
const RARITY_COLOR_MAP = { common:'var(--text)', rare:'var(--blue)', epic:'var(--purple)', legendary:'var(--accent)', champion:'#e74c3c' };
const RARITY_ORDER_KEYS = ['common','rare','epic','legendary','champion'];
let _planMode = 'account';
let _planTarget = MAX_LEVEL;

function cardsToMaxStats(c, target) {
  const r = (c.rarity||'common').toLowerCase();
  const disp = toDisplayLevel(r, c.level);
  if (disp >= target) return { needed: 0, gold: 0, rarity: r };
  const { totalCards, totalGold } = computeUpgrade(r, disp, c.count||0, target);
  return { needed: totalCards, gold: totalGold, rarity: r };
}
function buildPlanSummary(cards, target) {
  const byR = {};
  RARITY_ORDER_KEYS.forEach(r => byR[r] = { needed: 0, gold: 0 });
  let totalNeeded = 0, totalGold = 0;
  cards.forEach(c => {
    const s = cardsToMaxStats(c, target);
    if (byR[s.rarity]) { byR[s.rarity].needed += s.needed; byR[s.rarity].gold += s.gold; }
    totalNeeded += s.needed; totalGold += s.gold;
  });
  return { byR, totalNeeded, totalGold };
}
function buildDeckMapFromBattles(battles) {
  const deckMap = {};
  (battles||[]).forEach(b => {
    const team = (b.team||[])[0] || {};
    const cards = (team.cards||[]).map(c => c.name).sort().join('|');
    if (!cards) return;
    const tC = team.crowns||0, oC = ((b.opponent||[])[0]||{}).crowns||0;
    const result = tC > oC ? 'win' : tC < oC ? 'loss' : 'draw';
    if (!deckMap[cards]) deckMap[cards] = { cards: cards.split('|'), wins:0, losses:0, draws:0 };
    deckMap[cards][result + 's']++;
  });
  return deckMap;
}
function getPlanDeckOptions() {
  let dm = window._deckMapData;
  if (!dm || !Object.keys(dm).length) dm = buildDeckMapFromBattles(window._planBattles || []);
  return Object.values(dm || {}).sort((a,b) => (b.wins+b.losses+b.draws) - (a.wins+a.losses+a.draws)).slice(0,8);
}
function renderUpgradePlanner(data, battles) {
  window._planData = data;
  window._planBattles = battles || [];
  _planMode = 'account';
  _planTarget = MAX_LEVEL;
  const decks = getPlanDeckOptions();
  const selStyle = "flex:1;min-width:0;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center";
  return `
    <div class="card">
      <h3 style="margin-bottom:6px">📈 Upgrade Planner</h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Cards &amp; gold needed by rarity to reach your target level</p>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select onchange="setPlanMode(this.value)" style="${selStyle}">
          <option value="account">Whole account</option>
          ${decks.map((d,i) => `<option value="deck-${i}">Deck #${i+1} · ${d.wins}W ${d.losses}L (${d.cards.slice(0,3).map(esc).join(', ')}…)</option>`).join('')}
        </select>
        <select onchange="setPlanTarget(this.value)" style="${selStyle}">
          <option value="16">to Lv 16</option>
          <option value="15">to Lv 15</option>
          <option value="14">to Lv 14</option>
        </select>
      </div>
      <div id="plan-output">${buildPlanOutput()}</div>
    </div>`;
}
window.setPlanMode = function(v) {
  _planMode = v;
  document.getElementById('plan-output').innerHTML = buildPlanOutput();
};
window.setPlanTarget = function(v) {
  _planTarget = parseInt(v,10) || MAX_LEVEL;

// ── Suggested Upgrades (scoped by account or deck) ──
let _suggestMode = 'account';
window.setSuggestMode = function(v) {
  _suggestMode = v;
  document.getElementById('suggested-output').innerHTML = buildSuggestedOutput();
};
function buildSuggestedOutput() {
  const data = window._planData;
  if (!data) return '';
  const enriched = (data.cards||[]).map(c => {
    const r = (c.rarity||'common').toLowerCase();
    const disp = toDisplayLevel(r, c.level);
    const steps = LEVEL_DATA[r] || [];
    const minL  = MIN_LEVEL[r] || 1;
    const idx   = disp - minL;
    const isMaxed = disp >= MAX_LEVEL || idx >= steps.length;
    const nextStep = (!isMaxed && idx >= 0 && idx < steps.length) ? steps[idx] : null;
    const isUpgradable = !isMaxed && !!nextStep && (c.count||0) >= nextStep.cards;
    return { ...c, r, disp, isMaxed, nextStep, isUpgradable };
  });
  let upgradable = enriched.filter(c => c.isUpgradable);
  if (_suggestMode.startsWith('deck-')) {
    const idx = parseInt(_suggestMode.slice(5),10);
    const decks = getPlanDeckOptions();
    const deck = decks[idx];
    if (!deck) return '<div class="empty-msg">Deck not found.</div>';
    const deckNames = new Set(deck.cards);
    upgradable = upgradable.filter(c => deckNames.has(c.name));
  }
  if (!upgradable.length) return '<div class="empty-msg">No upgrades ready right now in this scope.</div>';
  const sorted = [...upgradable].sort((a,b) => (a.nextStep?.gold||0) - (b.nextStep?.gold||0)).slice(0,5);
  return sorted.map(c => `<div class="stat-row">
    <span class="stat-label" style="display:flex;align-items:center;gap:6px">
      ${c.iconUrls?.medium?`<img src="${c.iconUrls.medium}" alt="" style="width:22px;height:28px;object-fit:contain;flex-shrink:0">`:''}
      <span>${esc(c.name)} <span style="color:var(--muted);font-size:11px">(Lv ${c.disp}→${c.disp+1})</span></span>
    </span>
    <span class="stat-value text-accent">${fmtNum(c.nextStep?.gold)} 💰</span>
  </div>`).join('');
}
function buildPlanOutput() {
  const data = window._planData;
  if (!data) return '';
  let cards = data.cards || [];
  let titleSuffix = '';
  if (_planMode.startsWith('deck-')) {
    const idx = parseInt(_planMode.slice(5),10);
    const decks = getPlanDeckOptions();
    const deck = decks[idx];
    if (!deck) return '<div class="empty-msg">Deck not found.</div>';
    const deckNames = new Set(deck.cards);
    cards = cards.filter(c => deckNames.has(c.name));
    titleSuffix = ` (deck)`;
  }
  const target = _planTarget;
  const sum = buildPlanSummary(cards, target);
  const rows = RARITY_ORDER_KEYS.map(r => {
    const v = sum.byR[r];
    if (v.needed === 0 && v.gold === 0) return '';
    return `<div class="stat-row">
      <span class="stat-label" style="color:${RARITY_COLOR_MAP[r]};font-weight:600">${RARITY_DISPLAY_NAME[r]}</span>
      <span style="display:flex;gap:12px;align-items:center;font-size:13px"><span class="text-red">+${fmtNum(v.needed)}</span><span class="text-accent">${fmtNum(v.gold)} 💰</span></span>
    </div>`;
  }).filter(Boolean).join('');
  if (sum.totalNeeded === 0 && sum.totalGold === 0) {
    return `<div class="empty-msg">All cards already at Lv ${target}! 🎉</div>`;
  }
  return `${rows}
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-weight:700;font-size:14px">
      <span>Total${titleSuffix}</span>
      <span style="display:flex;gap:12px"><span class="text-red">+${fmtNum(sum.totalNeeded)}</span><span class="text-accent">${fmtNum(sum.totalGold)} 💰</span></span>
    </div>`;
}

let _deckUpMode = 'recent';            // 'recent' or 'custom'

  let body = '';

      if (_deckUpSelectedDeckIdx >= decks.length) _deckUpSelectedDeckIdx = 0;
      body = `
        <select onchange="setDeckUpRecent(this.value)" style="width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;margin-bottom:12px;appearance:none;-webkit-appearance:none;text-align:center">

window.setDeckUpMode = function(m) { _deckUpMode = m; renderDeckUpgradeScreen(); };
window.setDeckUpRecent = function(idx) { _deckUpSelectedDeckIdx = parseInt(idx,10) || 0; renderDeckUpgradeScreen(); };
window.setDeckUpTarget = function(v) { _deckUpTarget = parseInt(v,10) || MAX_LEVEL; renderDeckUpgradeScreen(); };
window.setDeckUpSearch = function(v) { _deckUpSearch = (v||'').toLowerCase().trim(); renderDeckUpgradeScreen(); };
window.addDeckUpCard = function(id) {
  id = parseInt(id, 10);
  if (_deckUpCustomIds.includes(id) || _deckUpCustomIds.length >= 8) return;
  _deckUpCustomIds.push(id);
  _deckUpSearch = '';
  renderDeckUpgradeScreen();
};
window.removeDeckUpCard = function(id) {
  _deckUpCustomIds = _deckUpCustomIds.filter(x => x !== parseInt(id, 10));
  renderDeckUpgradeScreen();
};
window.clearDeckUp = function() {
  _deckUpCustomIds = [];
  _deckUpSearch = '';

};

function renderCustomDeckBuilder(data) {
  const selectedCards = _deckUpCustomIds.map(id => data.cards.find(c => c.id === id)).filter(Boolean);
  const slots = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">
      ${Array.from({length:8}, (_,i) => {
        const c = selectedCards[i];
        if (!c) return `<div style="background:var(--surface2);border:1px dashed var(--border);border-radius:8px;aspect-ratio:0.83;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px">Slot ${i+1}</div>`;
        const r = (c.rarity||'common').toLowerCase();
        const disp = toDisplayLevel(r, c.level);
        return `<div onclick="removeDeckUpCard(${c.id})" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px;text-align:center;cursor:pointer;position:relative">
          ${c.iconUrls?.medium ? `<img src="${c.iconUrls.medium}" alt="${esc(c.name)}" style="width:100%;height:auto;display:block;margin:0 auto" loading="lazy">` : ''}
          <div style="font-size:10px;font-weight:700;color:var(--accent)">Lv ${disp}</div>
          <span style="position:absolute;top:2px;right:4px;color:var(--red);font-size:14px;font-weight:700">×</span>

      }).join('')}

  const searchHtml = _deckUpCustomIds.length < 8 ? `
    <input type="text" placeholder="🔍 Add card to deck…" value="${esc(_deckUpSearch)}" oninput="setDeckUpSearch(this.value)" autocomplete="off"
      style="width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;margin-bottom:8px">` : '';
  let suggestions = '';
  if (_deckUpSearch && _deckUpCustomIds.length < 8) {
    const matches = data.cards
      .filter(c => !_deckUpCustomIds.includes(c.id) && (c.name||'').toLowerCase().includes(_deckUpSearch))
      .slice(0,10);
    if (matches.length) {
      suggestions = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;max-height:280px;overflow-y:auto">
        ${matches.map(c => {
          const r = (c.rarity||'common').toLowerCase();
          const disp = toDisplayLevel(r, c.level);

        }).join('')}

    }
  }
  const clearBtn = _deckUpCustomIds.length ? `<button class="btn btn-secondary btn-sm" style="margin-bottom:12px" onclick="clearDeckUp()">↺ Clear deck</button>` : '';
  return `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${_deckUpCustomIds.length} / 8 cards selected</div>

    ${clearBtn}
    ${searchHtml}

}

function renderDeckBreakdown(cards) {
  if (!cards.length) return '<div class="empty-msg">No cards.</div>';
  const target = _deckUpTarget;
  const enriched = cards.map(c => {
    const r = (c.rarity||'common').toLowerCase();
    const disp = toDisplayLevel(r, c.level);
    const s = cardsToMaxStats(c, target);
    return { ...c, r, disp, needed: s.needed, gold: s.gold };
  }).sort((a,b) => (b.gold||0) - (a.gold||0));

  const rows = enriched.map(c => `
    <div class="stat-row">
      <span class="stat-label" style="display:flex;align-items:center;gap:8px;min-width:0">
        ${c.iconUrls?.medium ? `<img src="${c.iconUrls.medium}" alt="" style="width:32px;height:40px;object-fit:contain;flex-shrink:0">` : ''}
        <span style="display:flex;flex-direction:column;min-width:0">
          <span style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</span>
          <span style="font-size:11px;color:${RARITY_COLOR_MAP[c.r]||'var(--muted)'}">${RARITY_DISPLAY_NAME[c.r]||c.r} · Lv ${c.disp}${c.disp>=target?' (maxed)':' → '+target}</span>
        </span>
      </span>
      <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-size:12px">
        <span class="${c.needed>0?'text-red':'text-green'}">${c.needed>0?'+'+fmtNum(c.needed)+' cards':'✓ Enough'}</span>
        <span class="text-accent">${fmtNum(c.gold)} 💰</span>
      </span>
    </div>`).join('');

  // Rarity totals
  const byR = {};
  RARITY_ORDER_KEYS.forEach(r => byR[r] = { needed: 0, gold: 0 });
  let totalNeeded = 0, totalGold = 0;
  enriched.forEach(c => {
    if (byR[c.r]) { byR[c.r].needed += c.needed; byR[c.r].gold += c.gold; }
    totalNeeded += c.needed; totalGold += c.gold;
  });
  const rarityRows = RARITY_ORDER_KEYS.map(r => {
    const v = byR[r];
    if (!v.needed && !v.gold) return '';
    return `<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0">
      <span style="color:${RARITY_COLOR_MAP[r]};font-weight:600">${RARITY_DISPLAY_NAME[r]}</span>
      <span style="display:flex;gap:12px"><span class="text-red">+${fmtNum(v.needed)}</span><span class="text-accent">${fmtNum(v.gold)} 💰</span></span>
    </div>`;
  }).filter(Boolean).join('');

  return `
    ${rows}
    <div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Totals by rarity</div>
      ${rarityRows}
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-weight:700;font-size:14px">
        <span>Total to Lv ${target}</span>
        <span style="display:flex;gap:12px"><span class="text-red">+${fmtNum(totalNeeded)}</span><span class="text-accent">${fmtNum(totalGold)} 💰</span></span>
      </div>
    </div>`;
}

function renderOverview(data, battles) {
  const cards = data.cards || [];

  // Compute per-card enriched data
  const enriched = cards.map(c => {
    const r = (c.rarity||'common').toLowerCase();
    const disp = toDisplayLevel(r, c.level);
    const minL = MIN_LEVEL[r] || 1;
    const steps = LEVEL_DATA[r] || [];
    const idx = disp - minL;
    const isMaxed = disp >= MAX_LEVEL || idx >= steps.length;
    const nextStep = (!isMaxed && idx >= 0 && idx < steps.length) ? steps[idx] : null;
    const isUpgradable = !isMaxed && !!nextStep && (c.count||0) >= nextStep.cards;
    const canMax = !isMaxed && cardsNeededToMax(r, disp, c.count||0) === 0;
    return { ...c, r, disp, isMaxed, isUpgradable, canMax, nextStep };
  });

  const maxedCount      = enriched.filter(c => c.isMaxed).length;
  const upgradableNow   = enriched.filter(c => c.isUpgradable);
  const canMaxCards     = enriched.filter(c => c.canMax);
  const totalGoldReady  = upgradableNow.reduce((s, c) => s + (c.nextStep?.gold || 0), 0);
  const evoIds          = new Set(allCards.filter(c => c.iconUrls?.evolutionMedium).map(c => c.id));
  const heroIds         = new Set(allCards.filter(c => c.iconUrls?.heroMedium).map(c => c.id));
  // For dual cards (both evolutionMedium AND heroMedium), evolutionLevel tracks
  // hero stages (1…maxEvolutionLevel). Owning the evolution form pushes
  // evolutionLevel *above* maxEvolutionLevel. Pure evolution cards just need > 0.
  const evolvedCount    = evoIds.size > 0
    ? cards.filter(c => {
        if (!evoIds.has(c.id)) return false;
        const evo    = c.evolutionLevel    || 0;
        const maxEvo = c.maxEvolutionLevel || 0;
        if (heroIds.has(c.id)) return maxEvo > 0 && evo >= maxEvo; // dual card
        return evo > 0; // evolution-only card
      }).length
    : cards.filter(c => (c.evolutionLevel||0) > 0).length;
  const heroCount       = heroIds.size > 0
    ? cards.filter(c => heroIds.has(c.id) && (c.evolutionLevel||0) > 0).length
    : 0;
  const supportCards    = data.supportCards || [];
  // Enrich tower troops for Upgrade Insights
  const troopEnriched   = supportCards.map(c => {
    const r    = (c.rarity || 'legendary').toLowerCase();
    const disp = toDisplayLevel(r, c.level);
    const minL = MIN_LEVEL[r] || 1;
    const steps = LEVEL_DATA[r] || [];
    const idx  = disp - minL;
    const isMaxed    = disp >= MAX_LEVEL || idx >= steps.length;
    const nextStep   = (!isMaxed && idx >= 0 && idx < steps.length) ? steps[idx] : null;
    const isUpgradable = !isMaxed && !!nextStep && (c.count||0) >= nextStep.cards;
    return { ...c, r, disp, isMaxed, nextStep, isUpgradable };
  });
  const troopMaxed      = troopEnriched.filter(c => c.isMaxed).length;
  const troopUpgradable = troopEnriched.filter(c => c.isUpgradable);
  const troopCanMax     = troopEnriched.filter(c => !c.isMaxed && cardsNeededToMax(c.r, c.disp, c.count||0) === 0).length;
  const troopGoldReady  = troopUpgradable.reduce((s, c) => s + (c.nextStep?.gold || 0), 0);
  const towerTroopCL    = supportCards.reduce((s, c) => {
    const r = (c.rarity||'common').toLowerCase();
    return s + toDisplayLevel(r, c.level);
  }, 0);
  const cardLevelCL     = enriched.reduce((s, c) => s + c.disp, 0) + towerTroopCL;
  const collectionLevel = cardLevelCL + (evolvedCount * 5) + (heroCount * 5);
  const kingTowerLevel  = calcKingTowerLevel(enriched.map(c => c.disp));
  const nextMilestone   = nextCLMilestone(collectionLevel);
  const prevMilestone   = collectionLevel < 20 ? 0 : collectionLevel >= 1500
    ? Math.floor(collectionLevel / 5) * 5
    : Math.floor(collectionLevel / 10) * 10;
  const milestoneProgress = Math.round((collectionLevel - prevMilestone) / (nextMilestone - prevMilestone) * 100);
  // King Tower Level — progress toward next level
  const nextKtlReq = KTL_REQ.find(r => r.lvl === kingTowerLevel + 1);
  const ktlProgress = nextKtlReq
    ? enriched.filter(c => c.disp >= nextKtlReq.min).length
    : null;
  const fav = data.currentFavouriteCard;

  // Top 5 suggested upgrades: upgradable sorted by cheapest gold first
  const suggested = [...upgradableNow]
    .sort((a, b) => (a.nextStep?.gold||0) - (b.nextStep?.gold||0))
    .slice(0, 5);

  const suggestedRows = suggested.map(c =>
    `<div class="stat-row">
      <span class="stat-label" style="display:flex;align-items:center;gap:6px">
        ${c.iconUrls?.medium?`<img src="${c.iconUrls.medium}" alt="" style="width:22px;height:28px;object-fit:contain;flex-shrink:0">`:''}
        <span>${esc(c.name)} <span style="color:var(--muted);font-size:11px">(Lv ${c.disp}→${c.disp+1})</span></span>
      </span>
      <span class="stat-value text-accent">${fmtNum(c.nextStep?.gold)} 💰</span>
    </div>`
  ).join('');

  return `
    <div class="card">
      <div class="stat-row"><span class="stat-label">Highest Trophies</span><span class="stat-value">🏆 ${fmtNum(data.bestTrophies)}</span></div>
      <div class="stat-row"><span class="stat-label">Total Wins</span><span class="stat-value text-green">${fmtNum(data.wins)}</span></div>
      <div class="stat-row"><span class="stat-label">Total Losses</span><span class="stat-value text-red">${fmtNum(data.losses)}</span></div>
      <div class="stat-row"><span class="stat-label">3-Crown Wins</span><span class="stat-value">👑 ${fmtNum(data.threeCrownWins)}</span></div>
      <div class="stat-row"><span class="stat-label">Challenge Max Wins</span><span class="stat-value">${fmtNum(data.challengeMaxWins)}</span></div>
      <div class="stat-row"><span class="stat-label">Challenge Cards Won</span><span class="stat-value">${fmtNum(data.challengeCardsWon)}</span></div>
      <div class="stat-row"><span class="stat-label">Cards Donated</span><span class="stat-value">${fmtNum(data.totalDonations)}</span></div>
      ${fav ? `<div class="stat-row"><span class="stat-label">Favourite Card</span><span class="stat-value" style="display:flex;align-items:center;gap:6px">${fav.iconUrls?.medium?`<img src="${fav.iconUrls.medium}" alt="" style="width:26px;height:32px;object-fit:contain">`:''}${esc(fav.name)}</span></div>` : ''}
    </div>

    <div class="card">
      <h3 style="margin-bottom:4px">⚡ Card Insights</h3>
      <div style="margin-top:20px;margin-bottom:10px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px"><img src="cards-icon.webp" style="width:22px;height:18px;object-fit:contain;filter:brightness(0) invert(0.55)"> Cards</div>
      <div class="stat-row" style="border-bottom:none"><span class="stat-label">Maxed (Level 16)</span><strong class="text-accent">${maxedCount} / ${cards.length}</strong></div>
      <div class="progress-wrap mt8">
        <div class="progress-bar" style="width:${Math.round(maxedCount/Math.max(cards.length,1)*100)}%;background:var(--accent)"></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:8px">${Math.round(maxedCount/Math.max(cards.length,1)*100)}% maxed</div>
      <div class="stat-row"><span class="stat-label">Upgradable now</span><strong class="text-green">${upgradableNow.length}</strong></div>
      <div class="stat-row"><span class="stat-label">Can reach Level 16 now</span><strong class="text-blue">${canMaxCards.length}</strong></div>
      <div class="stat-row"><span class="stat-label">Gold to upgrade all ready</span><strong class="text-accent">${fmtNum(totalGoldReady)} 💰</strong></div>

      ${troopEnriched.length ? `
      <div style="margin-top:14px">
        <div style="margin-bottom:10px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px"><img src="tower-troop-icon.webp" style="width:14px;height:20px;object-fit:contain;filter:brightness(0) invert(0.55)"> Tower Troops</div>
        <div class="stat-row" style="border-bottom:none"><span class="stat-label">Maxed (Level 16)</span><strong class="text-accent">${troopMaxed} / ${troopEnriched.length}</strong></div>
        <div class="progress-wrap mt8">
          <div class="progress-bar" style="width:${Math.round(troopMaxed/troopEnriched.length*100)}%;background:var(--accent)"></div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:8px">${Math.round(troopMaxed/troopEnriched.length*100)}% maxed</div>
        <div class="stat-row"><span class="stat-label">Upgradable now</span><strong class="text-green">${troopUpgradable.length}</strong></div>
        <div class="stat-row"><span class="stat-label">Can reach Level 16 now</span><strong class="text-blue">${troopCanMax}</strong></div>
        ${troopGoldReady > 0 ? `<div class="stat-row"><span class="stat-label">Gold to upgrade all ready</span><strong class="text-accent">${fmtNum(troopGoldReady)} 💰</strong></div>` : ''}
      </div>` : ''}

      <div style="margin-top:14px">
        <div style="margin-bottom:10px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px"><img src="evo-hero-icon.webp" style="width:17px;height:20px;object-fit:contain;filter:grayscale(1) brightness(0) invert(0.55)"> Evolutions &amp; Heroes</div>
        <div class="stat-row" style="border-bottom:none"><span class="stat-label">Evolutions unlocked</span><strong class="text-blue">${evolvedCount} / ${evoIds.size}</strong></div>
        <div class="progress-wrap mt8"><div class="progress-bar" style="width:${Math.round(evolvedCount/Math.max(evoIds.size,1)*100)}%;background:var(--blue)"></div></div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:8px">${Math.round(evolvedCount/Math.max(evoIds.size,1)*100)}% unlocked</div>
        <div class="stat-row" style="border-bottom:none"><span class="stat-label">Heroes unlocked</span><strong class="text-purple">${heroCount} / ${heroIds.size}</strong></div>
        <div class="progress-wrap mt8"><div class="progress-bar" style="width:${Math.round(heroCount/Math.max(heroIds.size,1)*100)}%;background:var(--purple)"></div></div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${Math.round(heroCount/Math.max(heroIds.size,1)*100)}% unlocked</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px">📊 Collection Level</h3>
      <div class="stat-row" onclick="toggleCardMax('cl-breakdown')" style="cursor:pointer">
        <span class="stat-label">Collection Level <span id="cl-breakdown-toggle" style="font-size:10px;color:var(--muted)">▼</span></span>
        <strong style="font-size:20px;font-family:'Rajdhani',sans-serif">${fmtNum(collectionLevel)}</strong>
      </div>
      <div id="cl-breakdown-max" style="display:none;padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:2px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:2px 0"><span>Cards (levels)</span><span>+${fmtNum(cardLevelCL)}</span></div>
        ${evolvedCount > 0 ? `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:2px 0"><span>Evolutions (×5 each)</span><span style="color:var(--blue)">+${evolvedCount * 5} (${evolvedCount} evos)</span></div>` : ''}
        ${heroCount > 0 ? `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:2px 0"><span>Heroes (×5 each)</span><span style="color:var(--purple)">+${heroCount * 5} (${heroCount} heroes)</span></div>` : ''}
      </div>
      <div class="stat-row"><span class="stat-label">Next milestone</span><strong>${fmtNum(nextMilestone)}</strong></div>
      <div class="progress-wrap mt8">
        <div class="progress-bar" style="width:${milestoneProgress}%;background:var(--blue)"></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${collectionLevel - prevMilestone} / ${nextMilestone - prevMilestone} levels to next milestone</div>
    </div>

    ${renderUpgradePlanner(data, battles)}

    ${(() => {
      // Suggested Upgrades — scoped to whole account or a specific recent deck
      _suggestMode = 'account';
      const decks = getPlanDeckOptions();
      const selStyle = "width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center;margin-bottom:10px";
      return `
        <div class="card">
          <h3 style="margin-bottom:6px">💡 Suggested Upgrades</h3>
          <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Cheapest upgrades you can do right now</p>
          <select onchange="setSuggestMode(this.value)" style="${selStyle}">
            <option value="account">Whole account</option>
            ${decks.map((d,i) => `<option value="deck-${i}">Deck #${i+1} · ${d.wins}W ${d.losses}L (${d.cards.slice(0,3).map(esc).join(', ')}…)</option>`).join('')}
          </select>
          <div id="suggested-output">${buildSuggestedOutput()}</div>
        </div>`;
    })()}`;
}

// ── Cards pane ──
let _cardData = [];
let _cardFilter = 'all';
let _cardRarity = 'all';
let _cardSort   = 'level-desc';
let _cardSearch = '';

function renderCardsPane(data) {
  _cardData  = data.cards || [];
  _cardFilter = 'all';
  _cardRarity = 'all';
  _cardSort   = 'level-desc';
  _cardSearch = '';
  const totalCards = allCards.length || _cardData.length;
  return `
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">
      ${_cardData.length} / ${totalCards} cards unlocked
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select id="card-rarity-select" onchange="setCardFilter(this.value,'rarity')"
        style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center">
        <option value="all">All Rarities</option>
        <option value="common">Common</option>
        <option value="rare">Rare</option>
        <option value="epic">Epic</option>
        <option value="legendary">Legendary</option>
        <option value="champion">Champion</option>
      </select>
      <select id="card-sort-select" onchange="setCardFilter(this.value,'sort')"
        style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center">
        <option value="level-desc">Level ↓</option>
        <option value="level-asc">Level ↑</option>
        <option value="rarity">Rarity</option>
      </select>
    </div>
    <div class="filter-bar" id="card-status-filter">
      <button class="filter-btn active" onclick="setCardFilter('all','status')">All</button>
      <button class="filter-btn" onclick="setCardFilter('upgradable','status')">Upgradable</button>
      <button class="filter-btn" onclick="setCardFilter('canmax','status')">Can Max</button>
      <button class="filter-btn" onclick="setCardFilter('maxed','status')">Maxed</button>
    </div>
    <input type="text" id="card-name-search" placeholder="🔍 Search card name…" oninput="setCardSearch(this.value)" autocomplete="off"
      style="width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;font-family:'Inter',sans-serif;margin-bottom:10px">
    <div id="cards-grid"></div>`;
}

window.setCardFilter = function(val, type) {
  if (type === 'status') {
    _cardFilter = val;
    document.querySelectorAll('#card-status-filter .filter-btn').forEach(b =>
      b.classList.toggle('active', b.getAttribute('onclick').includes(`'${val}'`))
    );
  }
  if (type === 'rarity') _cardRarity = val;
  if (type === 'sort')   _cardSort   = val;
  renderCards();
};

window.setCardSearch = function(val) {
  _cardSearch = (val || '').toLowerCase().trim();
  renderCards();
};

const RARITY_ORDER = { common:0, rare:1, epic:2, legendary:3, champion:4 };

function renderCards() {
  const grid = document.getElementById('cards-grid');
  if (!grid) return;

  // Build maxStarLevel lookup from the /cards catalog so we show the right number
  // of empty stars (e.g. Poison has maxStarLevel 1, not 3)
  const catalogStarMax = {};
  allCards.forEach(ac => { if (ac.maxStarLevel) catalogStarMax[ac.id] = ac.maxStarLevel; });

  let cards = [..._cardData];
  if (_cardRarity !== 'all') cards = cards.filter(c => (c.rarity||'').toLowerCase() === _cardRarity);
  if (_cardSearch) cards = cards.filter(c => (c.name||'').toLowerCase().includes(_cardSearch));

  cards = cards.map(c => {
    const r = (c.rarity||'common').toLowerCase();
    const disp = toDisplayLevel(r, c.level);
    const steps = LEVEL_DATA[r] || [];
    const minL  = MIN_LEVEL[r] || 1;
    const idx   = disp - minL;
    const isMaxed     = disp >= MAX_LEVEL || idx >= steps.length;
    const nextStep    = (!isMaxed && idx >= 0 && idx < steps.length) ? steps[idx] : null;
    const isUpgradable = !isMaxed && !!nextStep && (c.count||0) >= nextStep.cards;
    const canMax       = !isMaxed && cardsNeededToMax(r, disp, c.count||0) === 0;
    return { ...c, r, disp, isMaxed, isUpgradable, canMax, nextStep };
  });

  if (_cardFilter === 'maxed')     cards = cards.filter(c => c.isMaxed);
  if (_cardFilter === 'upgradable') cards = cards.filter(c => c.isUpgradable);
  if (_cardFilter === 'locked')    cards = cards.filter(c => !c.isMaxed && !c.isUpgradable);
  if (_cardFilter === 'canmax')    cards = cards.filter(c => c.canMax);

  // Sort
  if (_cardSort === 'level-desc') cards.sort((a,b) => b.disp - a.disp);
  if (_cardSort === 'level-asc')  cards.sort((a,b) => a.disp - b.disp);
  if (_cardSort === 'rarity')     cards.sort((a,b) => (RARITY_ORDER[b.r]||0) - (RARITY_ORDER[a.r]||0) || b.disp - a.disp);

  if (!cards.length) {
    grid.innerHTML = '<div class="empty-msg">No cards match this filter.</div>';
    return;
  }

  const rarityColor = { common:'var(--text)', rare:'var(--blue)', epic:'var(--purple)', legendary:'var(--accent)', champion:'#e74c3c' };

  grid.innerHTML = cards.map(c => {
    const needed = c.nextStep ? c.nextStep.cards : 0;
    const owned  = c.count || 0;
    const pct    = c.isMaxed ? 100 : needed ? Math.min(100, Math.round(owned / needed * 100)) : 0;
    const statusLabel = c.isMaxed ? '<span class="badge badge-gold">MAX ★</span>'
      : c.isUpgradable ? '<span class="badge badge-green">Ready</span>'
      : c.canMax       ? '<span class="badge badge-blue">Can Max</span>'
      : '';

    // Lv 14 and below → tap-to-expand. Lv 15 → show "cards still needed" inline.
    const showMax    = !c.isMaxed && c.disp <= 15;
    const inlineMax  = !c.isMaxed && c.disp === 15;
    const toMax      = showMax ? computeUpgrade(c.r, c.disp, owned, MAX_LEVEL) : null;
    const domId      = `card-${c.id}`;

    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
      <div class="flex-between mb8">
        <div style="display:flex;align-items:center;gap:10px">
          ${c.iconUrls?.medium ? `<img src="${c.iconUrls.medium}" alt="${esc(c.name)}" style="width:52px;height:64px;object-fit:contain;flex-shrink:0" loading="lazy">` : ''}
          <div>
            <span style="font-weight:600;font-size:15px">${esc(c.name)}</span><br>
            <span style="font-size:11px;color:${rarityColor[c.r]||'var(--muted)'}">${c.r.charAt(0).toUpperCase()+c.r.slice(1)}</span>
            ${(() => { const sl = c.starLevel||0; const ms = c.maxStarLevel || catalogStarMax[c.id] || 0; return sl > 0 && ms > 0 ? `&nbsp;<span style="font-size:12px;letter-spacing:1px">${'<span style="color:#FFD700">★</span>'.repeat(Math.min(sl,ms))}${'<span style="color:#555577">★</span>'.repeat(Math.max(0,ms-Math.min(sl,ms)))}</span>` : ''; })()}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent)">Lv ${c.disp}</span>
          ${statusLabel}
        </div>
      </div>
      ${!c.isMaxed && c.nextStep ? `
        <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
          <span>Cards: ${fmtNum(owned)} / ${fmtNum(needed)}</span>
          <span>${fmtNum(c.nextStep.gold)} 💰 to Lv ${c.disp+1}</span>
        </div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${c.isUpgradable?'var(--green)':'var(--blue)'}"></div></div>
      ` : `
        <div style="font-size:12px;color:var(--muted)">Fully maxed! ✓</div>
      `}
      ${showMax ? (inlineMax ? `
        <div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">
          <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
            <span>Cards still needed</span>
            <span class="${toMax.totalCards > 0 ? 'text-red' : 'text-green'}">${toMax.totalCards > 0 ? '+'+fmtNum(toMax.totalCards) : '✓ Enough cards'}</span>
          </div>
          <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="openInCalculator(${c.id})">🧮 Open in Calculator</button>
        </div>
      ` : `
        <div onclick="toggleCardMax('${domId}')" style="cursor:pointer;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;user-select:none">
          <span id="${domId}-toggle">▼ Total to Lv 16</span>
        </div>
        <div id="${domId}-max" style="display:none;margin-top:6px">
          <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
            <span>Cards still needed</span>
            <span class="${toMax.totalCards > 0 ? 'text-red' : 'text-green'}">${toMax.totalCards > 0 ? '+'+fmtNum(toMax.totalCards) : '✓ Enough cards'}</span>
          </div>
          <div class="flex-between" style="font-size:12px;color:var(--muted)">
            <span>Total gold to Lv 16</span>
            <span style="color:var(--accent)">${fmtNum(toMax.totalGold)} 💰</span>
          </div>
          <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="openInCalculator(${c.id})">🧮 Open in Calculator</button>
        </div>
      `) : ''}
    </div>`;
  }).join('');
}

function resetCalculator() {
  document.getElementById('card-search').value = '';
  document.getElementById('card-dropdown').classList.remove('open');
  const note = document.getElementById('card-lookup-note');
  if (note) note.style.display = 'none';
  document.getElementById('calc-rarity').value = 'common';
  document.getElementById('calc-current').value = MIN_LEVEL['common'];
  document.getElementById('calc-count').value = 0;
  document.getElementById('calc-target').value = MAX_LEVEL;
  calcUpdate();
}

function openInCalculator(cardId) {
  goTo('calc');
  const cat = allCards.find(c => c.id === cardId);   // regular cards only
  const pc  = _playerCardsById[cardId];               // cards + tower troops
  const name = cat?.name || pc?.name || '';
  let r = (cat?.rarity || pc?.rarity || 'common').toLowerCase();
  if (!LEVEL_DATA[r]) r = 'common';

  const search = document.getElementById('card-search');
  if (search) search.value = name;
  const dd = document.getElementById('card-dropdown');
  if (dd) dd.classList.remove('open');
  document.getElementById('calc-rarity').value = r;

  const note = document.getElementById('card-lookup-note');
  if (pc) {
    const disp = toDisplayLevel(r, pc.level);
    document.getElementById('calc-current').value = disp;
    document.getElementById('calc-count').value = pc.count || 0;
    document.getElementById('calc-target').value = MAX_LEVEL;
    if (note) { note.textContent = `Loaded your ${name}: Level ${disp}, ${fmtNum(pc.count||0)} cards`; note.style.display = 'block'; }
  }
  calcUpdate();
  const res = document.getElementById('calc-result');
  if (res) res.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleCardMax(id) {

async function loadEvolutionsGrid() {
  const grid = document.getElementById('evolutions-grid');
  if (!grid || !grid.querySelector('.spinner')) return;

    await maybeLoadCards();

let _towerTroopSupportCards = [];  // data.supportCards from player API
let _towerTroopAllPlayerCards = []; // data.cards — fallback if supportCards absent

function renderTowerTroopsPane(data) {
  _towerTroopSupportCards  = data.supportCards || [];
  _towerTroopAllPlayerCards = data.cards || [];
  return `<div id="tower-troops-grid"><div class="spinner"></div></div>`;
}

async function loadTowerTroopsGrid() {
  const grid = document.getElementById('tower-troops-grid');
  if (!grid || !grid.querySelector('.spinner')) return;

  try {
    await maybeLoadCards();

    // Build a quick lookup from the full /cards catalog
    const catalogById = {};
    allCards.forEach(c => { catalogById[c.id] = c; });

    // Tower troops arrive in data.supportCards (separate from deck cards).
    // Each entry: { id, name, level, rarity, iconUrls: { medium, … } }
    // Fallback: if the API ever moves them into data.cards, filter by
    // iconUrls.towerProjectileMedium from the catalog (same naming pattern
    // as evolutionMedium / heroMedium).
    let troops = _towerTroopSupportCards;
    if (!troops.length) {
      // Fallback: identify via catalog flag and match against player cards
      const troopIds = new Set(allCards.filter(c => c.iconUrls?.towerProjectileMedium).map(c => c.id));
      if (troopIds.size) {
        troops = _towerTroopAllPlayerCards.filter(c => troopIds.has(c.id));
      }
    }

    if (!troops.length) {
      grid.innerHTML = '<div class="empty-msg">No tower troop data available from the API.</div>';
      return;
    }

    // Build enriched troop data (mirrors renderCards logic)
    const rarityColor = { common:'var(--text)', rare:'var(--blue)', epic:'var(--purple)', legendary:'var(--accent)', champion:'#e74c3c' };
    const enriched = troops.map(c => {
      const r       = (c.rarity || 'legendary').toLowerCase();
      const disp    = toDisplayLevel(r, c.level);
      const minL    = MIN_LEVEL[r] || 1;
      const steps   = LEVEL_DATA[r] || [];
      const idx     = disp - minL;
      const isMaxed = disp >= MAX_LEVEL || idx >= steps.length;
      const nextStep     = (!isMaxed && idx >= 0 && idx < steps.length) ? steps[idx] : null;
      const isUpgradable = !isMaxed && !!nextStep && (c.count||0) >= nextStep.cards;
      const canMax       = !isMaxed && cardsNeededToMax(r, disp, c.count||0) === 0;
      // Image: prefer towerProjectileMedium, fall back to medium
      const cat    = catalogById[c.id] || {};
      const imgUrl = cat.iconUrls?.towerProjectileMedium || c.iconUrls?.towerProjectileMedium
                  || cat.iconUrls?.medium               || c.iconUrls?.medium || '';
      return { ...c, r, disp, isMaxed, nextStep, isUpgradable, canMax, imgUrl };
    });

    const totalCL = enriched.reduce((s, c) => s + c.disp, 0);

    const troopRows = enriched.map(c => {
      const owned  = c.count || 0;
      const needed = c.nextStep ? c.nextStep.cards : 0;
      const pct    = c.isMaxed ? 100 : needed ? Math.min(100, Math.round(owned / needed * 100)) : 0;
      const statusLabel = c.isMaxed
        ? '<span class="badge badge-gold">MAX ★</span>'
        : c.isUpgradable ? '<span class="badge badge-green">Ready</span>'
        : c.canMax       ? '<span class="badge badge-blue">Can Max</span>'
        : '';
      const showMax    = !c.isMaxed && c.disp <= 15;
      const inlineMax  = !c.isMaxed && c.disp === 15;
      const toMax      = showMax ? computeUpgrade(c.r, c.disp, owned, MAX_LEVEL) : null;
      const domId      = `troop-${c.id}`;
      return `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
          <div class="flex-between mb8">
            <div style="display:flex;align-items:center;gap:10px">
              ${c.imgUrl ? `<img src="${c.imgUrl}" alt="${esc(c.name)}" style="width:52px;height:64px;object-fit:contain;flex-shrink:0" loading="lazy">` : ''}
              <div>
                <span style="font-weight:600;font-size:15px">${esc(c.name)}</span><br>
                <span style="font-size:11px;color:${rarityColor[c.r]||'var(--muted)'}">${c.r.charAt(0).toUpperCase()+c.r.slice(1)}</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <span style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent)">Lv ${c.disp}</span>
              ${statusLabel}
            </div>
          </div>
          ${!c.isMaxed && c.nextStep ? `
            <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
              <span>Cards: ${fmtNum(owned)} / ${fmtNum(needed)}</span>
              <span>${fmtNum(c.nextStep.gold)} 💰 to Lv ${c.disp+1}</span>
            </div>
            <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${c.isUpgradable?'var(--green)':'var(--blue)'}"></div></div>
          ` : `<div style="font-size:12px;color:var(--muted)">Fully maxed! ✓</div>`}
          ${showMax ? (inlineMax ? `
            <div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">
              <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
                <span>Cards still needed</span>
                <span class="${toMax.totalCards > 0 ? 'text-red' : 'text-green'}">${toMax.totalCards > 0 ? '+'+fmtNum(toMax.totalCards) : '✓ Enough cards'}</span>
              </div>
              <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="openInCalculator(${c.id})">🧮 Open in Calculator</button>
            </div>
          ` : `
            <div onclick="toggleCardMax('${domId}')" style="cursor:pointer;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;user-select:none">
              <span id="${domId}-toggle">▼ Total to Lv 16</span>
            </div>
            <div id="${domId}-max" style="display:none;margin-top:6px">
              <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
                <span>Cards still needed</span>
                <span class="${toMax.totalCards > 0 ? 'text-red' : 'text-green'}">${toMax.totalCards > 0 ? '+'+fmtNum(toMax.totalCards) : '✓ Enough cards'}</span>
              </div>
              <div class="flex-between" style="font-size:12px;color:var(--muted)">
                <span>Total gold to Lv 16</span>
                <span style="color:var(--accent)">${fmtNum(toMax.totalGold)} 💰</span>
              </div>
              <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="openInCalculator(${c.id})">🧮 Open in Calculator</button>
            </div>
          `) : ''}
        </div>`;
    }).join('');

    grid.innerHTML = `
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">
        ${troops.length} / ${troops.length} tower troops unlocked
      </div>
      ${troopRows}`;
  } catch(e) {
    grid.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}
