let _battleFilter = 'all';
function renderBattles(battles) {
  if (!battles || !battles.length) return '<div class="empty-msg">No battles found.</div>';
  window._battleData = battles;
  _battleFilter = 'all';
  return _renderBattleList(battles);
}

window.setBattleFilter = function(mode) {
  _battleFilter = mode;
  if (window._battleData) {
    document.getElementById('tab-battles').innerHTML = _renderBattleList(window._battleData);
  }
};

function _renderBattleList(battles) {
  const modes = [...new Set(battles.map(b => battleModeLabel(b)))];
  const modeButtons = ['all', ...modes].map(m =>
    `<button class="filter-btn ${_battleFilter===m?'active':''}" onclick="setBattleFilter('${m}')">${m === 'all' ? 'All Modes' : m}</button>`
  ).join('');
  const bar = `<div class="filter-bar">${modeButtons}</div>`;

  const filtered = _battleFilter === 'all' ? battles : battles.filter(b => battleModeLabel(b) === _battleFilter);
  if (!filtered.length) return `${bar}<div class="empty-msg">No battles for this filter.</div>`;

  const deckRow = (p) => (p.cards||[]).map(c => c.iconUrls?.medium
    ? `<div class="deck-card-chip" title="${esc(c.name)}"><img src="${c.iconUrls.medium}" alt="${esc(c.name)}" loading="lazy"></div>`
    : `<span class="deck-card-chip text-chip">${esc(c.name)}</span>`).join('');
  return bar + filtered.map(b => {
    const teamPlayers = b.team || [];
    const oppPlayers  = b.opponent || [];
    const team = teamPlayers[0] || {};
    const opp  = oppPlayers[0] || {};
    const tCrowns = team.crowns || 0;
    const oCrowns = opp.crowns || 0;
    let resLabel = 'DRAW', resColor = 'var(--muted)';
    if (tCrowns > oCrowns) { resLabel = 'VICTORY'; resColor = '#4a90e2'; }
    else if (tCrowns < oCrowns) { resLabel = 'DEFEAT'; resColor = 'var(--red)'; }
    const trophyChange = team.trophyChange;
    const is2v2 = teamPlayers.length > 1 || oppPlayers.length > 1;

    const sideNames = (players, color, align) => players.map(p =>
      `<div style="color:${color};font-weight:600;font-size:14px;text-align:${align};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name||'?')}</div>`
    ).join('');

    // 1v1 → show your deck + opponent's deck side by side. 2v2 → both teammates.
    const teamSet = new Set(teamPlayers);
    const deckPlayers = is2v2 ? teamPlayers : [...teamPlayers, ...oppPlayers];
    const showLabels = deckPlayers.length > 1;
    const deckCols = deckPlayers.map(p => {
      const names = (p.cards||[]).map(c => c.name).join(', ');
      const labelColor = teamSet.has(p) ? '#5b9bff' : '#e9685c';
      return `<div style="flex:1;min-width:0;text-align:center">
        ${showLabels ? `<div style="font-size:11px;color:${labelColor};font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name||'?')}</div>` : ''}
        <div style="display:grid;grid-template-columns:repeat(4,38px);gap:4px;justify-content:center;margin-top:4px">${deckRow(p)}</div>
        <button class="btn btn-secondary btn-sm" style="margin-top:6px;font-size:11px;padding:3px 9px" onclick="copyDeckLink('${esc(names)}',this)">📋 Copy</button>
      </div>`;
    }).join('');

    return `
      <div class="battle-item" style="padding:0;overflow:hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2)">
          <span style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:${resColor}">${resLabel}</span>
          <span style="font-size:15px;font-weight:700">
            <span style="color:#4a90e2">${tCrowns}</span>
            <span style="color:var(--muted)"> 👑 </span>
            <span style="color:var(--red)">${oCrowns}</span>
          </span>
          <span style="font-size:11px;color:var(--muted)">${esc(battleModeLabel(b))}</span>
        </div>
        <div style="display:flex">
          <div style="flex:1;background:rgba(74,144,226,0.10);padding:10px 12px;min-width:0">${sideNames(teamPlayers, '#5b9bff', 'center')}</div>
          <div style="flex:1;background:rgba(231,76,60,0.10);padding:10px 12px;min-width:0">${sideNames(oppPlayers, '#e9685c', 'center')}</div>
        </div>
        <div style="padding:10px 12px">
          <div style="display:flex;gap:12px">${deckCols}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(--muted)">
            <span>${formatBattleTime(b.battleTime)}</span>
            ${trophyChange != null ? `<span style="color:${trophyChange>=0?'var(--green)':'var(--red)'}">${trophyChange>=0?'+':''}${trophyChange} 🏆</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function battleModeLabel(b) {
  const gm = b.gameMode?.name || '';
  if (GAME_MODE_OVERRIDES[gm]) return GAME_MODE_OVERRIDES[gm];
  if (GAME_MODE_NAMES[gm])     return GAME_MODE_NAMES[gm];
  // Heuristics for any mode not in the table
  if (/Ranked|PathOfLegend/i.test(gm)) return 'Path of Legends';
  if (/TeamVsTeam|2v2|Duo/i.test(gm))  return /Friendly/i.test(gm) ? 'Friendly 2v2' : 'Classic 2v2';
  if (/BoatBattle/i.test(gm))          return 'Boat Battle';
  if (/Duel/i.test(gm))                return 'Duel';
  if (/RiverRace|ClanWar/i.test(gm))   return 'Clan War';
  if (/Ladder|TrophyRoad/i.test(gm))   return 'Trophy Road';
  if (/Showdown/i.test(gm))            return 'Showdown';
  if (/Tournament/i.test(gm))          return 'Tournament';
  if (/Challenge/i.test(gm))           return 'Challenge';
  if (/Friendly/i.test(gm))            return 'Friendly';
  if (gm) return gm.replace(/_/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2');
  return deckModeLabel(b.type || '');  // last-resort fallback to the coarse type
}

function renderDeckBuilder(battles) {
  if (!battles || !battles.length) return '<div class="empty-msg">No battle data to build decks from.</div>';
  window._deckBattles = battles;

  // Build card name → icon URL map from all cards seen in battles
  const iconMap = {};
  battles.forEach(b => {
    (b.team||[]).concat(b.opponent||[]).forEach(p => {
      (p.cards||[]).forEach(c => { if (c.name && c.iconUrls?.medium) iconMap[c.name] = c.iconUrls.medium; });
    });
  });
  window._cardIconMap = iconMap;

  const deckMap = {};
  battles.forEach(b => {
    const team = (b.team||[])[0] || {};
    const opp = (b.opponent||[])[0] || {};
    const cards = (team.cards||[]).map(c => c.name).sort().join('|');
    if (!cards) return;
    const tC = team.crowns||0, oC = opp.crowns||0;
    const result = tC > oC ? 'win' : tC < oC ? 'loss' : 'draw';
    if (!deckMap[cards]) deckMap[cards] = { cards: cards.split('|'), wins:0, losses:0, draws:0, modes:[], elixir:[] };
    deckMap[cards][result + 's']++;
    deckMap[cards].modes.push(battleModeLabel(b));
    const avg = (team.cards||[]).reduce((s,c) => s + (c.elixirCost||0), 0) / Math.max((team.cards||[]).length,1);
    deckMap[cards].elixir.push(avg);
  });

  window._deckMapData = deckMap;
  return _renderDeckList(deckMap, battles);
}

function _renderDeckList(deckMap, battles) {
  const entries = Object.values(deckMap);
  let filtered = entries;
  if (_deckFilter !== 'all') filtered = entries.filter(d => d.modes.includes(_deckFilter));
  filtered.sort((a,b) => (b.wins+b.losses+b.draws) - (a.wins+a.losses+a.draws));

  const modes = [...new Set(battles.map(b => battleModeLabel(b)))];
  const modeButtons = ['all', ...modes].map(m =>
    `<button class="filter-btn ${_deckFilter===m?'active':''}" onclick="setDeckFilter('${m}')">${m === 'all' ? 'All Modes' : m}</button>`
  ).join('');

  if (!filtered.length) return `<div class="filter-bar">${modeButtons}</div><div class="empty-msg">No decks for this filter.</div>`;

  const items = filtered.map(d => {
    const total = d.wins + d.losses + d.draws;
    const wr = total ? Math.round(d.wins / total * 100) : 0;
    const avgElixir = d.elixir.length ? (d.elixir.reduce((a,b)=>a+b,0)/d.elixir.length).toFixed(1) : '—';
    const cardChips = d.cards.map(c => {
      const icon = window._cardIconMap?.[c];
      return icon
        ? `<img src="${icon}" alt="${esc(c)}" title="${esc(c)}" style="width:100%;height:auto;display:block;border-radius:4px" loading="lazy">`
        : `<span style="font-size:9px;color:var(--text);display:flex;align-items:center;justify-content:center;text-align:center">${esc(c)}</span>`;
    }).join('');
    const names = d.cards.join(', ');
    const statRow = (lbl, val, cls) =>
      `<div style="margin-bottom:5px;text-align:center"><div class="${cls}" style="font-size:15px;font-weight:700;line-height:1.1">${val}</div><div style="font-size:10px;color:var(--muted)">${lbl}</div></div>`;
    return `
      <div class="deck-item">
        <div style="display:flex;gap:12px;align-items:center">
          <div style="flex:1;min-width:0">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">${cardChips}</div>
            <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%;font-size:11px;padding:4px 8px" onclick="copyDeckLink('${esc(names)}', this)">📋 Copy Deck</button>
          </div>
          <div style="flex:1;min-width:0">

              ${statRow('Draws', d.draws, 'text-muted')}

}

// Open the deck directly in Clash Royale (the "Copy Deck" dialog inside the game)
// via Supercell's official deep-link. Falls back to clipboard if cards can't be resolved.
window.copyDeckLink = function(names, btn) {
  const list = (names||'').split(',').map(s => s.trim()).filter(Boolean);
  const ids = list.map(n => {
    const c = allCards.find(c => c.name === n);
    return c ? c.id : null;
  }).filter(Boolean);
  const origText = btn ? btn.textContent : '';
  const showBriefly = (text) => {
    if (!btn) return;
    btn.textContent = text;
    setTimeout(() => btn.textContent = origText, 1800);
  };
  if (ids.length >= list.length && ids.length > 0) {
    const url = `https://link.clashroyale.com/deck/en?deck=${ids.join(';')}`;
    window.open(url, '_blank');
    showBriefly('✓ Opening…');
  } else {
    // Fallback: copy card names to clipboard if any IDs are unknown
    navigator.clipboard.writeText(names).then(() => showBriefly('✓ Copied (fallback)'));
  }
};


// tab pane show — lazy render cards
document.addEventListener('click', e => {

});

function clanBadgeUrl(badgeId) {
  const name = CLAN_BADGES[badgeId];
  return name ? `https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/badges/${name}.png` : '';
}

function countryFlag(code) {
  if (!code || code.length !== 2) return '';
  return code.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}

let _clanMembers = [];
let _clanSort = 'trophies';

async function loadClan() {
  const raw = document.getElementById('clan-tag').value.trim();
  if (!raw) return;
  const tag = raw.startsWith('#') ? raw : '#' + raw;
  const el = document.getElementById('clan-result');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await apiGet('/clans/' + encodeURIComponent(tag));
    renderClan(data);
    saveClanCache(tag, data);
  } catch(e) {
    el.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

// ── Clan cache (matches the profile cache pattern) ──
function saveClanCache(tag, data) {
  try { localStorage.setItem('cr_clan_cache', JSON.stringify({ tag, data, savedAt: Date.now() })); } catch(e) {}
}
function loadClanCache(tag) {
  try {
    const c = JSON.parse(localStorage.getItem('cr_clan_cache') || 'null');
    return (c && c.tag === tag) ? c : null;
  } catch(e) { return null; }
}

function renderClan(data) {
  _clanMembers = data.memberList || [];
  const el = document.getElementById('clan-result');
  const typeMap = { open:'Open', inviteOnly:'Invite Only', closed:'Closed' };
  const badge = clanBadgeUrl(data.badgeId);
  const loc = data.location ? `${data.location.isCountry ? countryFlag(data.location.countryCode) + ' ' : '🌍 '}${esc(data.location.name)}` : '';
  el.innerHTML = `
    <div class="clan-header">
      <div style="display:flex;align-items:center;gap:12px">
        ${badge ? `<img src="${badge}" alt="" style="width:52px;height:62px;object-fit:contain;flex-shrink:0">` : ''}
        <div>
          <div class="clan-name">${esc(data.name)}</div>
          <div class="player-tag">${data.tag}</div>
          ${loc ? `<div style="font-size:13px;color:var(--muted);margin-top:2px">${loc}</div>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;font-size:13px">
        <span title="Clan Score">🏆 <strong style="color:var(--accent)">${fmtNum(data.clanScore)}</strong></span>
        <span title="Clan War Trophies">⚔️ <strong style="color:var(--accent)">${fmtNum(data.clanWarTrophies)}</strong></span>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:13px;color:var(--muted);flex-wrap:wrap">
        <span>👥 ${data.members} / 50</span>
        <span>🏅 ${fmtNum(data.requiredTrophies)} req.</span>
        <span>${typeMap[data.type]||data.type||''}</span>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px">📦 ${fmtNum(data.donationsPerWeek)} donations / week</div>
      ${data.description ? `<div class="clan-desc">${esc(data.description)}</div>` : ''}
    </div>
    <div style="margin-bottom:10px">
      <select id="clan-sort-select" onchange="setClanSort(this.value)"
        style="width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center">
        <option value="trophies">Sort: Trophies</option>
        <option value="donations">Sort: Donations</option>
        <option value="lastseen">Sort: Last Seen</option>
      </select>
    </div>
    <div id="clan-members-list"></div>`;
  renderMembers(_clanMembers);
}

window.setClanSort = function(by) {
  _clanSort = by;
  renderMembers(_clanMembers);
};

function renderMembers(members) {
  const sorted = [...members];
  if (_clanSort === 'trophies') sorted.sort((a,b) => (b.trophies||0) - (a.trophies||0));
  else if (_clanSort === 'donations') sorted.sort((a,b) => (b.donations||0) - (a.donations||0));
  else if (_clanSort === 'lastseen') {
    // lastSeen is a lexicographically-sortable timestamp; most recent first
    sorted.sort((a,b) => (b.lastSeen||'').localeCompare(a.lastSeen||''));
  } else sorted.sort((a,b) => (a.clanRank||99) - (b.clanRank||99));

  const roleLabel = { leader:'👑 Leader', coLeader:'⭐ Co-Leader', elder:'🔰 Elder', member:'Member' };
  const html = sorted.map((m,i) => {
    // Rank movement arrow (previousClanRank vs clanRank; 0 = new this season)
    let move = '';
    const prev = m.previousClanRank || 0, cur = m.clanRank || 0;
    if (prev === 0) move = '<span style="color:var(--blue)" title="New">●</span>';
    else if (prev > cur) move = `<span style="color:var(--green)" title="Up ${prev-cur}">▲</span>`;
    else if (prev < cur) move = `<span style="color:var(--red)" title="Down ${cur-prev}">▼</span>`;
    else move = '<span style="color:var(--muted)">–</span>';
    const seen = formatBattleTime(m.lastSeen);
    return `
    <div class="member-item">
      <div>
        <div class="member-name"><span style="color:var(--muted);font-size:12px">#${cur}</span> ${move} ${esc(m.name)}</div>
        <div class="member-role">${roleLabel[m.role]||m.role} · ${m.tag}</div>
        ${seen ? `<div style="color:var(--muted);font-size:11px;margin-top:2px">🕓 ${seen}</div>` : ''}
      </div>
      <div class="member-stats">
        <div>🏆 ${fmtNum(m.trophies)}</div>
        <div style="color:var(--muted);font-size:12px">${fmtNum(m.donations)} donations</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('clan-members-list').innerHTML = html;
}
