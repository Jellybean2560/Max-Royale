<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#e8b84b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Max Royale">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Max Royale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223a;
    --surface3: #2a2a45;
    --accent: #e8b84b;
    --accent2: #f4d03f;
    --blue: #4a9eff;
    --green: #2ecc71;
    --red: #e74c3c;
    --purple: #9b59b6;
    --text: #e8e8f0;
    --muted: #888899;
    --border: #33334d;
    --nav-h: 64px;
    --radius: 12px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; }
  #content { flex: 1; overflow-y: auto; padding-bottom: var(--nav-h); }
  .screen { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── Bottom Nav ── */
  #nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 11px; cursor: pointer; transition: color .2s; padding: 0; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── Typography ── */
  h1, h2, h3 { font-family: 'Rajdhani', sans-serif; font-weight: 700; }
  h1 { font-size: 28px; }
  h2 { font-size: 22px; }
  h3 { font-size: 18px; }

  /* ── Cards / Surfaces ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-sm { background: var(--surface2); border-radius: 8px; padding: 12px; margin-bottom: 8px; }

  /* ── Inputs ── */
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 10px 12px; outline: none; transition: border-color .2s; }
  input:focus, select:focus { border-color: var(--accent); }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field { margin-bottom: 14px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s, transform .1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface3); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Tags / Badges ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-gold { background: #3d2f00; color: var(--accent); }
  .badge-blue { background: #002244; color: var(--blue); }
  .badge-green { background: #003322; color: var(--green); }
  .badge-red { background: #330011; color: var(--red); }
  .badge-purple { background: #220033; color: var(--purple); }

  /* ── Progress bar ── */
  .progress-wrap { background: var(--surface3); border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 4px; transition: width .4s; }

  /* ── Tabs ── */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── Stat row ── */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); font-size: 14px; }
  .stat-value { font-weight: 600; }

  /* ── Loading / Error states ── */
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); background: #330011; border: 1px solid var(--red); border-radius: 8px; padding: 12px; margin: 12px 0; font-size: 14px; }
  .empty-msg { color: var(--muted); text-align: center; padding: 40px 0; font-size: 14px; }


  /* ── Calculator ── */
  .calc-result { background: var(--surface2); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
  .calc-result h3 { color: var(--accent); margin-bottom: 12px; }
  .level-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .level-table th { text-align: left; color: var(--muted); padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 500; }
  .level-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); }
  .level-table tr:last-child td { border-bottom: none; }
  .level-table .highlight td { color: var(--accent); font-weight: 600; }
  .totals-box { margin-top: 14px; background: var(--surface3); border-radius: 8px; padding: 12px; }

  /* ── Card picker dropdown ── */
  .dropdown-wrap { position: relative; }
  .dropdown-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 200; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto; display: none; }
  .dropdown-list.open { display: block; }
  .dropdown-item { padding: 9px 12px; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .dropdown-item:hover { background: var(--surface3); }
  .dropdown-item .rarity-tag { font-size: 11px; color: var(--muted); }

  /* ── Player / Clan lookup ── */
  .lookup-header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .player-name { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; }
  .player-tag { color: var(--muted); font-size: 13px; font-family: monospace; }
  .trophies { display: block; margin-top: 6px; font-size: 13px; color: var(--muted); }

  /* ── Card grid ── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
  .card-item { background: var(--surface2); border-radius: 8px; padding: 10px 8px; text-align: center; border: 1px solid var(--border); }
  .card-item.maxed { border-color: var(--accent); }
  .card-item.upgradable { border-color: var(--green); }
  .card-item .card-name { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.3; }
  .card-item .card-level { font-size: 13px; font-weight: 700; }
  .card-item .card-count { font-size: 11px; color: var(--muted); }

  /* ── Battle log ── */
  .battle-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .battle-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .battle-result { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; }
  .battle-result.win { color: var(--green); }
  .battle-result.loss { color: var(--red); }
  .battle-result.draw { color: var(--muted); }
  .battle-mode { font-size: 12px; color: var(--muted); }
  .battle-crowns { font-size: 13px; }
  .deck-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .deck-card-chip { display: inline-flex; align-items: center; justify-content: center; background: var(--surface3); border-radius: 4px; width: 38px; height: 46px; overflow: hidden; flex-shrink: 0; }
  .deck-card-chip img { width: 100%; height: 100%; object-fit: contain; }
  .deck-card-chip.text-chip { width: auto; height: auto; padding: 3px 7px; font-size: 10px; }

  /* ── Deck builder ── */
  .deck-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .deck-stats { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .deck-stat { text-align: center; }
  .deck-stat .val { font-size: 20px; font-weight: 700; font-family: 'Rajdhani', sans-serif; }
  .deck-stat .lbl { font-size: 11px; color: var(--muted); }
  .winrate-bar { margin: 8px 0; }

  /* ── Achievements ── */
  .ach-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .ach-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .ach-name { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700; }
  .ach-stars { color: var(--accent); font-size: 16px; letter-spacing: 2px; }
  .ach-info { font-size: 13px; color: var(--muted); margin-bottom: 8px; }

  /* ── Clan ── */
  .clan-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .clan-name { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; }
  .clan-desc { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .member-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
  .member-name { font-weight: 600; font-size: 14px; }
  .member-role { font-size: 11px; color: var(--muted); text-transform: capitalize; }
  .member-stats { text-align: right; font-size: 13px; }

  /* ── Sort / Filter bar ── */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .filter-btn.active { background: var(--surface3); color: var(--text); border-color: var(--accent); }

  /* ── Misc ── */
  .flex-row { display: flex; align-items: center; gap: 10px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .mt8 { margin-top: 8px; }
  .mt16 { margin-top: 16px; }
  .mb8 { margin-bottom: 8px; }
  .text-accent { color: var(--accent); }
  .text-muted { color: var(--muted); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-blue { color: var(--blue); }
  .monospace { font-family: monospace; }
</style>
</head>
<body>
<div id="app">
  <div id="content">

    <!-- ═══════════════ CALCULATOR ═══════════════ -->
    <div id="screen-calc" class="screen">
      <h2 style="margin-bottom:16px">🧮 Upgrade Calculator</h2>

      <div class="card">
        <div class="field">
          <label>Card Lookup</label>
          <div class="dropdown-wrap">
            <input type="text" id="card-search" placeholder="Type card name…" oninput="onCardSearch(this.value)" autocomplete="off">
            <div class="dropdown-list" id="card-dropdown"></div>
          </div>
          <div id="card-lookup-note" style="display:none;font-size:12px;color:var(--accent);margin-top:6px"></div>
        </div>
        <div class="field">
          <label>Rarity</label>
          <select id="calc-rarity">
            <option value="common">Common</option>
            <option value="rare">Rare</option>
            <option value="epic">Epic</option>
            <option value="legendary">Legendary</option>
            <option value="champion">Champion</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field">
            <label>Current Level</label>
            <input type="number" id="calc-current" min="1" max="16" value="1" oninput="calcUpdate()">
          </div>
          <div class="field">
            <label>Cards Owned</label>
            <input type="number" id="calc-count" min="0" value="0" oninput="calcUpdate()">
          </div>
        </div>
        <div class="field">
          <label>Target Level</label>
          <input type="number" id="calc-target" min="2" max="16" value="16" oninput="calcUpdate()">
        </div>
      </div>

      <div id="calc-result"></div>
    </div>

    <!-- ═══════════════ PLAYER LOOKUP ═══════════════ -->
    <div id="screen-lookup" class="screen active">
      <h2 style="margin-bottom:16px">🔍 Player Lookup</h2>
      <div class="card">
        <div class="field" style="margin-bottom:0">
          <label>Player Tag</label>
          <div class="flex-row">
            <input type="text" id="player-tag" placeholder="#ABC123" style="flex:1" onkeydown="if(event.key==='Enter')loadPlayer()">
            <button class="btn btn-primary" onclick="loadPlayer()">Search</button>
          </div>
        </div>
      </div>
      <div id="player-result">
        <div style="text-align:center;padding:48px 0 32px">
          <img src="icon.png" alt="Max Royale" style="width:120px;height:120px;margin-bottom:20px">
          <div style="font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;color:var(--accent);letter-spacing:1px">Max Royale</div>
          <div style="font-size:13px;color:var(--muted);margin-top:6px">Enter a player tag above to get started</div>
        </div>
      </div>
    </div>

    <!-- ═══════════════ CLAN LOOKUP ═══════════════ -->
    <div id="screen-clan" class="screen">
      <h2 style="margin-bottom:16px">🛡 Clan Lookup</h2>
      <div class="card">
        <div class="field" style="margin-bottom:0">
          <label>Clan Tag</label>
          <div class="flex-row">
            <input type="text" id="clan-tag" placeholder="#ABC123" style="flex:1" onkeydown="if(event.key==='Enter')loadClan()">
            <button class="btn btn-primary" onclick="loadClan()">Search</button>
          </div>
        </div>
      </div>
      <div id="clan-result"></div>
    </div>

  </div><!-- /content -->

  <!-- ═══════════════ BOTTOM NAV ═══════════════ -->
  <nav id="nav">
    <button class="nav-btn active" id="nav-lookup" onclick="goTo('lookup')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Player
    </button>
    <button class="nav-btn" id="nav-clan" onclick="goTo('clan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clan
    </button>
    <button class="nav-btn" id="nav-calc" onclick="goTo('calc')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
      Calculator
    </button>
  </nav>
</div>

<script>
// ═══════════════════════════════════════════════
//  UPGRADE DATA
// ═══════════════════════════════════════════════
// Index 0 = upgrade from minLevel to minLevel+1
const LEVEL_DATA = {
  common: [
    {cards:2,    gold:5},      // 1→2
    {cards:4,    gold:20},     // 2→3
    {cards:10,   gold:50},     // 3→4
    {cards:20,   gold:150},    // 4→5
    {cards:50,   gold:400},    // 5→6
    {cards:100,  gold:1000},   // 6→7
    {cards:200,  gold:2000},   // 7→8
    {cards:400,  gold:4000},   // 8→9
    {cards:800,  gold:8000},   // 9→10
    {cards:1000, gold:15000},  // 10→11
    {cards:1500, gold:25000},  // 11→12
    {cards:2500, gold:40000},  // 12→13
    {cards:3500, gold:60000},  // 13→14
    {cards:5500, gold:90000},  // 14→15
    {cards:7500, gold:120000}, // 15→16
  ],
  rare: [
    {cards:2,    gold:50},     // 3→4
    {cards:4,    gold:150},    // 4→5
    {cards:10,   gold:400},    // 5→6
    {cards:20,   gold:1000},   // 6→7
    {cards:50,   gold:2000},   // 7→8
    {cards:100,  gold:4000},   // 8→9
    {cards:200,  gold:8000},   // 9→10
    {cards:300,  gold:15000},  // 10→11
    {cards:400,  gold:25000},  // 11→12
    {cards:550,  gold:40000},  // 12→13
    {cards:750,  gold:60000},  // 13→14
    {cards:1000, gold:90000},  // 14→15
    {cards:1400, gold:120000}, // 15→16
  ],
  epic: [
    {cards:2,   gold:400},     // 6→7
    {cards:4,   gold:2000},    // 7→8
    {cards:10,  gold:4000},    // 8→9
    {cards:20,  gold:8000},    // 9→10
    {cards:30,  gold:15000},   // 10→11
    {cards:50,  gold:25000},   // 11→12
    {cards:70,  gold:40000},   // 12→13
    {cards:100, gold:60000},   // 13→14
    {cards:130, gold:90000},   // 14→15
    {cards:180, gold:120000},  // 15→16
  ],
  legendary: [
    {cards:2,  gold:5000},     // 9→10
    {cards:4,  gold:15000},    // 10→11
    {cards:6,  gold:25000},    // 11→12
    {cards:9,  gold:40000},    // 12→13
    {cards:12, gold:60000},    // 13→14
    {cards:14, gold:90000},    // 14→15
    {cards:20, gold:120000},   // 15→16
  ],
  champion: [
    {cards:2,  gold:25000},    // 11→12
    {cards:5,  gold:40000},    // 12→13
    {cards:8,  gold:60000},    // 13→14
    {cards:11, gold:90000},    // 14→15
    {cards:15, gold:120000},   // 15→16
  ],
};

const XP_DATA = {
  common:    [4,5,6,10,25,50,100,200,400,600,800,1600,2000,50000,200000],
  rare:      [6,10,25,50,100,200,400,600,800,1600,2000,50000,200000],
  epic:      [25,100,200,400,600,800,1600,2000,50000,200000],
  legendary: [250,600,800,1600,2000,50000,200000],
  champion:  [800,1600,2000,50000,200000],
};

const MIN_LEVEL = { common:1, rare:3, epic:6, legendary:9, champion:11 };
const MAX_LEVEL = 16;

// King Tower Level requirements (May 2026 update)
const KTL_REQ = [
  {lvl:2, need:9, min:1},{lvl:3, need:9, min:2},{lvl:4, need:10, min:3},
  {lvl:5, need:10, min:4},{lvl:6, need:10, min:5},{lvl:7, need:10, min:6},
  {lvl:8, need:10, min:7},{lvl:9, need:10, min:8},{lvl:10, need:10, min:9},
  {lvl:11, need:10, min:10},{lvl:12, need:11, min:11},{lvl:13, need:11, min:12},
  {lvl:14, need:12, min:13},{lvl:15, need:13, min:14},{lvl:16, need:14, min:15}
];
function calcKingTowerLevel(dispLevels) {
  let ktl = 1;
  for (const r of KTL_REQ) {
    if (dispLevels.filter(l => l >= r.min).length >= r.need) ktl = r.lvl;
    else break;
  }
  return ktl;
}
function nextCLMilestone(cl) {
  if (cl < 20) return 20;
  if (cl >= 1500) return Math.ceil((cl + 1) / 5) * 5;
  return Math.ceil((cl + 1) / 10) * 10;
}

function toDisplayLevel(rarity, apiLevel) {
  return apiLevel + (MIN_LEVEL[rarity] || 1) - 1;
}

// XP earned so far (sum of XP for all upgrades already done, i.e. minLevel → dispLevel)
function xpEarned(rarity, dispLevel) {
  const xp = XP_DATA[rarity] || [];
  const minL = MIN_LEVEL[rarity] || 1;
  let total = 0;
  for (let i = 0; i < dispLevel - minL && i < xp.length; i++) total += xp[i];
  return total;
}

// XP still available from dispLevel → 16
function xpToMax(rarity, dispLevel) {
  const xp = XP_DATA[rarity] || [];
  const minL = MIN_LEVEL[rarity] || 1;
  let total = 0;
  for (let i = dispLevel - minL; i < xp.length; i++) total += xp[i];
  return total;
}

// Cards still needed (beyond what's owned) to fully upgrade to level 16
function cardsNeededToMax(rarity, dispLevel, ownedCount) {
  const steps = LEVEL_DATA[rarity] || [];
  const minL = MIN_LEVEL[rarity] || 1;
  let needed = 0, remaining = ownedCount;
  for (let lv = dispLevel; lv < MAX_LEVEL; lv++) {
    const idx = lv - minL;
    if (idx < 0 || idx >= steps.length) break;
    const req = steps[idx].cards;
    if (remaining >= req) { remaining -= req; }
    else { needed += req - remaining; remaining = 0; }
  }
  return needed; // 0 = can max right now
}

function computeUpgrade(rarity, currentLevel, currentCount, targetLevel) {
  const data = LEVEL_DATA[rarity];
  const minL = MIN_LEVEL[rarity];
  const results = [];
  let cardsLeft = currentCount;
  let totalCards = 0, totalGold = 0;

  for (let lvl = currentLevel; lvl < targetLevel; lvl++) {
    const idx = lvl - minL;
    if (idx < 0 || idx >= data.length) break;
    const step = data[idx];
    const need = Math.max(0, step.cards - cardsLeft);
    totalCards += need;
    totalGold += step.gold;
    cardsLeft = Math.max(0, cardsLeft - step.cards);
    results.push({ from: lvl, to: lvl + 1, cardsNeeded: need, gold: step.gold, cardsRequired: step.cards });
  }
  return { steps: results, totalCards, totalGold };
}

async function apiGet(path) {
  const cleanPath = path.replace(/#/g, '%23');
  const url = `https://quiet-frost-f9f0.jellevandenwouwer.workers.dev${cleanPath}`;
  let res;
  try {
    res = await fetch(url);
  } catch(e) {
    throw new Error('Connection failed — check your internet connection and try again.');
  }
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    let msg = '';
    try { msg = JSON.parse(txt).message; } catch(e) { msg = txt.slice(0, 300); }
    throw new Error(`API error ${res.status}${msg ? ': ' + msg : ''}`);
  }
  return res.json();
}

function fmtNum(n) { return n == null ? '—' : n.toLocaleString(); }

function formatBattleTime(ts) {
  if (!ts) return '';
  const y = ts.slice(0,4), mo = ts.slice(4,6), d = ts.slice(6,8);
  const h = ts.slice(9,11), mi = ts.slice(11,13), s = ts.slice(13,15);
  const date = new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}Z`);
  const diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function calcUpdate() {
  const rarity = document.getElementById('calc-rarity').value;
  const current = parseInt(document.getElementById('calc-current').value) || 1;
  const count = parseInt(document.getElementById('calc-count').value) || 0;
  const target = parseInt(document.getElementById('calc-target').value) || 16;
  const minL = MIN_LEVEL[rarity];
  const maxL = minL + LEVEL_DATA[rarity].length;

  const clampedCurrent = Math.max(minL, Math.min(maxL - 1, current));
  const clampedTarget = Math.max(clampedCurrent + 1, Math.min(maxL, target));

  const { steps, totalCards, totalGold } = computeUpgrade(rarity, clampedCurrent, count, clampedTarget);

  const rows = steps.map(s =>
    `<tr>
      <td>${s.from}→${s.to}</td>
      <td>${s.cardsRequired.toLocaleString()}</td>
      <td class="${s.cardsNeeded > 0 ? 'text-red' : 'text-green'}">${s.cardsNeeded > 0 ? '+'+s.cardsNeeded.toLocaleString() : '✓'}</td>
      <td>${s.gold ? s.gold.toLocaleString() : '—'}</td>
    </tr>`
  ).join('');

  const html = `
    <div class="calc-result">
      <h3>Upgrade Path: ${rarity.charAt(0).toUpperCase()+rarity.slice(1)} ${clampedCurrent} → ${clampedTarget}</h3>
      <table class="level-table">
        <thead><tr><th>Level</th><th>Cards req.</th><th>Need</th><th>Gold</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="totals-box mt8">
        <div class="flex-between">
          <span class="text-muted">Total cards needed</span>
          <strong class="${totalCards > 0 ? 'text-red' : 'text-green'}">${totalCards > 0 ? '+'+totalCards.toLocaleString() : '✓ Enough cards'}</strong>
        </div>
        <div class="flex-between mt8">
          <span class="text-muted">Total gold needed</span>
          <strong class="text-accent">${totalGold.toLocaleString()} 💰</strong>
        </div>
      </div>
    </div>`;

  document.getElementById('calc-result').innerHTML = html;
}

document.getElementById('calc-rarity').addEventListener('change', () => {

  const maxL = minL + LEVEL_DATA[rarity].length;

});

let _cardFilter = 'all';
let _cardRarity = 'all';

function renderCardsPane(data) {
  _cardData  = data.cards || [];
  _cardFilter = 'all';
  _cardRarity = 'all';

        style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center">
        <option value="level-desc">Level ↓</option>

      </select>

    <div class="filter-bar" id="card-status-filter">
      <button class="filter-btn active" onclick="setCardFilter('all','status')">All</button>
      <button class="filter-btn" onclick="setCardFilter('upgradable','status')">Upgradable</button>
      <button class="filter-btn" onclick="setCardFilter('canmax','status')">Can Max</button>
      <button class="filter-btn" onclick="setCardFilter('maxed','status')">Maxed</button>
    </div>
    <div id="cards-grid"></div>`;
}

window.setCardFilter = function(val, type) {
  if (type === 'status') {
    _cardFilter = val;
    document.querySelectorAll('#card-status-filter .filter-btn').forEach(b =>
      b.classList.toggle('active', b.getAttribute('onclick').includes(`'${val}'`))
    );
  }
  if (type === 'rarity') _cardRarity = val;
  if (type === 'sort')   _cardSort   = val;
  renderCards();
};

const RARITY_ORDER = { common:0, rare:1, epic:2, legendary:3, champion:4 };

function renderCards() {
  const grid = document.getElementById('cards-grid');
  if (!grid) return;

  // Build maxStarLevel lookup from the /cards catalog so we show the right number
  // of empty stars (e.g. Poison has maxStarLevel 1, not 3)
  const catalogStarMax = {};
  allCards.forEach(ac => { if (ac.maxStarLevel) catalogStarMax[ac.id] = ac.maxStarLevel; });

  let cards = [..._cardData];
  if (_cardRarity !== 'all') cards = cards.filter(c => (c.rarity||'').toLowerCase() === _cardRarity);

  cards = cards.map(c => {
    const r = (c.rarity||'common').toLowerCase();
    const disp = toDisplayLevel(r, c.level);
    const steps = LEVEL_DATA[r] || [];
    const minL  = MIN_LEVEL[r] || 1;
    const idx   = disp - minL;
    const isMaxed     = disp >= MAX_LEVEL || idx >= steps.length;
    const nextStep    = (!isMaxed && idx >= 0 && idx < steps.length) ? steps[idx] : null;
    const isUpgradable = !isMaxed && !!nextStep && (c.count||0) >= nextStep.cards;
    const canMax       = !isMaxed && cardsNeededToMax(r, disp, c.count||0) === 0;
    return { ...c, r, disp, isMaxed, isUpgradable, canMax, nextStep };
  });

  if (_cardFilter === 'maxed')     cards = cards.filter(c => c.isMaxed);
  if (_cardFilter === 'upgradable') cards = cards.filter(c => c.isUpgradable);
  if (_cardFilter === 'locked')    cards = cards.filter(c => !c.isMaxed && !c.isUpgradable);
  if (_cardFilter === 'canmax')    cards = cards.filter(c => c.canMax);

  // Sort
  if (_cardSort === 'level-desc') cards.sort((a,b) => b.disp - a.disp);
  if (_cardSort === 'level-asc')  cards.sort((a,b) => a.disp - b.disp);
  if (_cardSort === 'rarity')     cards.sort((a,b) => (RARITY_ORDER[b.r]||0) - (RARITY_ORDER[a.r]||0) || b.disp - a.disp);

  if (!cards.length) {
    grid.innerHTML = '<div class="empty-msg">No cards match this filter.</div>';
    return;
  }

  const rarityColor = { common:'var(--text)', rare:'var(--blue)', epic:'var(--purple)', legendary:'var(--accent)', champion:'#e74c3c' };

  grid.innerHTML = cards.map(c => {
    const needed = c.nextStep ? c.nextStep.cards : 0;
    const owned  = c.count || 0;
    const pct    = c.isMaxed ? 100 : needed ? Math.min(100, Math.round(owned / needed * 100)) : 0;
    const statusLabel = c.isMaxed ? '<span class="badge badge-gold">MAX ★</span>'
      : c.isUpgradable ? '<span class="badge badge-green">Ready</span>'
      : c.canMax       ? '<span class="badge badge-blue">Can Max</span>'
      : '';

    // Full path to Lv 16 (shown on tap) for cards at Lv 14 or below
    const showMax = !c.isMaxed && c.disp <= 14;
    const toMax   = showMax ? computeUpgrade(c.r, c.disp, owned, MAX_LEVEL) : null;
    const domId   = `card-${c.id}`;

    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
      <div class="flex-between mb8">
        <div style="display:flex;align-items:center;gap:10px">
          ${c.iconUrls?.medium ? `<img src="${c.iconUrls.medium}" alt="${esc(c.name)}" style="width:52px;height:64px;object-fit:contain;flex-shrink:0" loading="lazy">` : ''}
          <div>
            <span style="font-weight:600;font-size:15px">${esc(c.name)}</span><br>
            <span style="font-size:11px;color:${rarityColor[c.r]||'var(--muted)'}">${c.r.charAt(0).toUpperCase()+c.r.slice(1)}</span>
            ${(() => { const sl = c.starLevel||0; const ms = c.maxStarLevel || catalogStarMax[c.id] || 0; return sl > 0 && ms > 0 ? `&nbsp;<span style="font-size:12px;letter-spacing:1px">${'<span style="color:#FFD700">★</span>'.repeat(Math.min(sl,ms))}${'<span style="color:#555577">★</span>'.repeat(Math.max(0,ms-Math.min(sl,ms)))}</span>` : ''; })()}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent)">Lv ${c.disp}</span>
          ${statusLabel}
        </div>
      </div>
      ${!c.isMaxed && c.nextStep ? `
        <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
          <span>Cards: ${fmtNum(owned)} / ${fmtNum(needed)}</span>
          <span>${fmtNum(c.nextStep.gold)} 💰 to Lv ${c.disp+1}</span>
        </div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${c.isUpgradable?'var(--green)':'var(--blue)'}"></div></div>
      ` : `
        <div style="font-size:12px;color:var(--muted)">Fully maxed! ✓</div>
      `}
      ${showMax ? `
        <div onclick="toggleCardMax('${domId}')" style="cursor:pointer;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;user-select:none">
          <span id="${domId}-toggle">▼ Total to Lv 16</span>
        </div>
        <div id="${domId}-max" style="display:none;margin-top:6px">
          <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
            <span>Cards still needed</span>
            <span class="${toMax.totalCards > 0 ? 'text-red' : 'text-green'}">${toMax.totalCards > 0 ? '+'+fmtNum(toMax.totalCards) : '✓ Enough cards'}</span>
          </div>
          <div class="flex-between" style="font-size:12px;color:var(--muted)">
            <span>Total gold to Lv 16</span>
            <span style="color:var(--accent)">${fmtNum(toMax.totalGold)} 💰</span>
          </div>
        </div>
      ` : ''}
    </div>`;
  }).join('');
}

function toggleCardMax(id) {
  const el     = document.getElementById(id + '-max');
  const toggle = document.getElementById(id + '-toggle');
  if (!el) return;
  const opening = el.style.display === 'none' || el.style.display === '';
  el.style.display = opening ? 'block' : 'none';
  if (toggle) toggle.textContent = opening
    ? '▲'
    : id === 'cl-breakdown' ? '▼' : '▼ Total to Lv 16';
}

async function loadEvolutionsGrid() {
  const grid = document.getElementById('evolutions-grid');
  if (!grid || !grid.querySelector('.spinner')) return;
  try {
    await maybeLoadCards();
    _evoCatalog = allCards.filter(c => c.iconUrls?.evolutionMedium);
    if (!_evoCatalog.length) { grid.innerHTML = '<div class="empty-msg">No evolution data available.</div>'; return; }

      return evo > 0;
    };
    const ownedCount = _evoCatalog.filter(_evoHasEvolution).length;
    grid.innerHTML = `

// ── Tower Troops pane ──
let _towerTroopSupportCards = [];  // data.supportCards from player API
let _towerTroopAllPlayerCards = []; // data.cards — fallback if supportCards absent

function renderTowerTroopsPane(data) {
  _towerTroopSupportCards  = data.supportCards || [];
  _towerTroopAllPlayerCards = data.cards || [];
  return `<div id="tower-troops-grid"><div class="spinner"></div></div>`;
}

async function loadTowerTroopsGrid() {
  const grid = document.getElementById('tower-troops-grid');
  if (!grid || !grid.querySelector('.spinner')) return;

  try {
    await maybeLoadCards();

    // Build a quick lookup from the full /cards catalog
    const catalogById = {};
    allCards.forEach(c => { catalogById[c.id] = c; });

    // Tower troops arrive in data.supportCards (separate from deck cards).
    // Each entry: { id, name, level, rarity, iconUrls: { medium, … } }
    // Fallback: if the API ever moves them into data.cards, filter by
    // iconUrls.towerProjectileMedium from the catalog (same naming pattern
    // as evolutionMedium / heroMedium).
    let troops = _towerTroopSupportCards;
    if (!troops.length) {
      // Fallback: identify via catalog flag and match against player cards
      const troopIds = new Set(allCards.filter(c => c.iconUrls?.towerProjectileMedium).map(c => c.id));
      if (troopIds.size) {
        troops = _towerTroopAllPlayerCards.filter(c => troopIds.has(c.id));
      }
    }

    if (!troops.length) {
      grid.innerHTML = '<div class="empty-msg">No tower troop data available from the API.</div>';
      return;
    }

    // Build enriched troop data (mirrors renderCards logic)
    const rarityColor = { common:'var(--text)', rare:'var(--blue)', epic:'var(--purple)', legendary:'var(--accent)', champion:'#e74c3c' };
    const enriched = troops.map(c => {
      const r       = (c.rarity || 'legendary').toLowerCase();
      const disp    = toDisplayLevel(r, c.level);
      const minL    = MIN_LEVEL[r] || 1;
      const steps   = LEVEL_DATA[r] || [];
      const idx     = disp - minL;
      const isMaxed = disp >= MAX_LEVEL || idx >= steps.length;
      const nextStep     = (!isMaxed && idx >= 0 && idx < steps.length) ? steps[idx] : null;
      const isUpgradable = !isMaxed && !!nextStep && (c.count||0) >= nextStep.cards;
      const canMax       = !isMaxed && cardsNeededToMax(r, disp, c.count||0) === 0;
      // Image: prefer towerProjectileMedium, fall back to medium
      const cat    = catalogById[c.id] || {};
      const imgUrl = cat.iconUrls?.towerProjectileMedium || c.iconUrls?.towerProjectileMedium
                  || cat.iconUrls?.medium               || c.iconUrls?.medium || '';
      return { ...c, r, disp, isMaxed, nextStep, isUpgradable, canMax, imgUrl };
    });

    const totalCL = enriched.reduce((s, c) => s + c.disp, 0);

    const troopRows = enriched.map(c => {
      const owned  = c.count || 0;
      const needed = c.nextStep ? c.nextStep.cards : 0;
      const pct    = c.isMaxed ? 100 : needed ? Math.min(100, Math.round(owned / needed * 100)) : 0;
      const statusLabel = c.isMaxed
        ? '<span class="badge badge-gold">MAX ★</span>'
        : c.isUpgradable ? '<span class="badge badge-green">Ready</span>'
        : c.canMax       ? '<span class="badge badge-blue">Can Max</span>'
        : '';
      const showMax = !c.isMaxed && c.disp <= 14;
      const toMax   = showMax ? computeUpgrade(c.r, c.disp, owned, MAX_LEVEL) : null;
      const domId   = `troop-${c.id}`;
      return `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
          <div class="flex-between mb8">
            <div style="display:flex;align-items:center;gap:10px">
              ${c.imgUrl ? `<img src="${c.imgUrl}" alt="${esc(c.name)}" style="width:52px;height:64px;object-fit:contain;flex-shrink:0" loading="lazy">` : ''}
              <div>
                <span style="font-weight:600;font-size:15px">${esc(c.name)}</span><br>
                <span style="font-size:11px;color:${rarityColor[c.r]||'var(--muted)'}">${c.r.charAt(0).toUpperCase()+c.r.slice(1)}</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <span style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent)">Lv ${c.disp}</span>
              ${statusLabel}
            </div>
          </div>
          ${!c.isMaxed && c.nextStep ? `
            <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
              <span>Cards: ${fmtNum(owned)} / ${fmtNum(needed)}</span>
              <span>${fmtNum(c.nextStep.gold)} 💰 to Lv ${c.disp+1}</span>
            </div>
            <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${c.isUpgradable?'var(--green)':'var(--blue)'}"></div></div>
          ` : `<div style="font-size:12px;color:var(--muted)">Fully maxed! ✓</div>`}
          ${showMax ? `
            <div onclick="toggleCardMax('${domId}')" style="cursor:pointer;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;user-select:none">
              <span id="${domId}-toggle">▼ Total to Lv 16</span>
            </div>
            <div id="${domId}-max" style="display:none;margin-top:6px">
              <div class="flex-between" style="font-size:12px;color:var(--muted);margin-bottom:4px">
                <span>Cards still needed</span>
                <span class="${toMax.totalCards > 0 ? 'text-red' : 'text-green'}">${toMax.totalCards > 0 ? '+'+fmtNum(toMax.totalCards) : '✓ Enough cards'}</span>
              </div>
              <div class="flex-between" style="font-size:12px;color:var(--muted)">
                <span>Total gold to Lv 16</span>
                <span style="color:var(--accent)">${fmtNum(toMax.totalGold)} 💰</span>
              </div>
            </div>
          ` : ''}
        </div>`;
    }).join('');

    grid.innerHTML = `
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">
        ${troops.length} / ${troops.length} tower troops unlocked
      </div>
      ${troopRows}`;
  } catch(e) {
    grid.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

// ── Battles pane ──
function renderBattles(battles) {
  if (!battles || !battles.length) return '<div class="empty-msg">No battles found.</div>';
  return battles.map(b => {
    const team = (b.team||[])[0] || {};
    const opp = (b.opponent||[])[0] || {};
    const tCrowns = team.crowns || 0;
    const oCrowns = opp.crowns || 0;
    let result = 'draw', resLabel = 'DRAW';
    if (tCrowns > oCrowns) { result = 'win'; resLabel = 'WIN'; }
    else if (tCrowns < oCrowns) { result = 'loss'; resLabel = 'LOSS'; }
    const trophyChange = b.team?.[0]?.trophyChange;
    const cards = (team.cards||[]).map(c => c.iconUrls?.medium
      ? `<div class="deck-card-chip" title="${esc(c.name)}"><img src="${c.iconUrls.medium}" alt="${esc(c.name)}" loading="lazy"></div>`
      : `<span class="deck-card-chip text-chip">${esc(c.name)}</span>`).join('');
    return `
      <div class="battle-item">
        <div class="battle-header">
          <div>
            <div class="battle-result ${result}">${resLabel}</div>
            <div class="battle-mode">${esc(b.type||'')}</div>
          </div>
          <div style="text-align:right">
            <div class="battle-crowns">${tCrowns} — ${oCrowns} 👑</div>
            ${trophyChange != null ? `<div style="font-size:12px;color:${trophyChange>=0?'var(--green)':'var(--red)'}">${trophyChange>=0?'+':''}${trophyChange} 🏆</div>` : ''}
            <div style="font-size:11px;color:var(--muted)">${formatBattleTime(b.battleTime)}</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">vs ${esc(opp.name||'Unknown')}</div>
        <div class="deck-row">${cards}</div>
      </div>`;
  }).join('');
}

let _deckFilter = 'all';
window._deckMapData = null;
window._deckBattles = null;

const DECK_MODE_LABELS = {
  trail: 'Trophy Road',
  PvP: 'Ladder',
  pathOfLegend: 'Path of Legends',
  boatBattle: 'Boat Battle',
  riverRacePvP: 'Clan War',
  riverRaceDuel: 'Clan War Duel',
  riverRaceDuelColosseum: 'Colosseum Duel',
  casual1v1: 'Friendly 1v1',
  casual2v2: 'Friendly 2v2',
  challenge: 'Challenge',
  tournament: 'Tournament',
  classicChallenge: 'Classic Challenge',
  grandChallenge: 'Grand Challenge',
  seasonalBattle: 'Event',
  clanMate: 'Friendly',
  clanMate2v2: 'Friendly 2v2',
  practice: 'Practice'
};
function deckModeLabel(m) {
  if (DECK_MODE_LABELS[m]) return DECK_MODE_LABELS[m];
  // Fallback: split camelCase / capitalise unknown types
  return (m || 'Unknown').replace(/([a-z])([A-Z])/g, '$1 $2').replace(/^\w/, c => c.toUpperCase());
}

function renderDeckBuilder(battles) {
  if (!battles || !battles.length) return '<div class="empty-msg">No battle data to build decks from.</div>';
  window._deckBattles = battles;

  // Build card name → icon URL map from all cards seen in battles
  const iconMap = {};
  battles.forEach(b => {
    (b.team||[]).concat(b.opponent||[]).forEach(p => {
      (p.cards||[]).forEach(c => { if (c.name && c.iconUrls?.medium) iconMap[c.name] = c.iconUrls.medium; });
    });
  });
  window._cardIconMap = iconMap;

  const deckMap = {};
  battles.forEach(b => {
    const team = (b.team||[])[0] || {};
    const opp = (b.opponent||[])[0] || {};
    const cards = (team.cards||[]).map(c => c.name).sort().join('|');
    if (!cards) return;
    const tC = team.crowns||0, oC = opp.crowns||0;
    const result = tC > oC ? 'win' : tC < oC ? 'loss' : 'draw';
    if (!deckMap[cards]) deckMap[cards] = { cards: cards.split('|'), wins:0, losses:0, draws:0, modes:[], elixir:[] };
    deckMap[cards][result + 's']++;
    deckMap[cards].modes.push(b.type||'unknown');
    const avg = (team.cards||[]).reduce((s,c) => s + (c.elixirCost||0), 0) / Math.max((team.cards||[]).length,1);
    deckMap[cards].elixir.push(avg);
  });

  window._deckMapData = deckMap;
  return _renderDeckList(deckMap, battles);
}

function _renderDeckList(deckMap, battles) {
  const entries = Object.values(deckMap);
  let filtered = entries;
  if (_deckFilter !== 'all') filtered = entries.filter(d => d.modes.includes(_deckFilter));
  filtered.sort((a,b) => (b.wins+b.losses+b.draws) - (a.wins+a.losses+a.draws));

  const modes = [...new Set(battles.map(b => b.type||'unknown'))];
  const modeButtons = ['all', ...modes].map(m =>
    `<button class="filter-btn ${_deckFilter===m?'active':''}" onclick="setDeckFilter('${m}')">${m === 'all' ? 'All Modes' : deckModeLabel(m)}</button>`
  ).join('');

  if (!filtered.length) return `<div class="filter-bar">${modeButtons}</div><div class="empty-msg">No decks for this filter.</div>`;

  const items = filtered.map(d => {
    const total = d.wins + d.losses + d.draws;
    const wr = total ? Math.round(d.wins / total * 100) : 0;
    const avgElixir = d.elixir.length ? (d.elixir.reduce((a,b)=>a+b,0)/d.elixir.length).toFixed(1) : '—';
    const cardChips = d.cards.map(c => {
      const icon = window._cardIconMap?.[c];
      return icon
        ? `<div class="deck-card-chip" title="${esc(c)}"><img src="${icon}" alt="${esc(c)}" loading="lazy"></div>`
        : `<span class="deck-card-chip text-chip">${esc(c)}</span>`;
    }).join('');
    const names = d.cards.join(', ');
    return `
      <div class="deck-item">
        <div class="deck-stats">
          <div class="deck-stat"><div class="val text-green">${d.wins}</div><div class="lbl">Wins</div></div>
          <div class="deck-stat"><div class="val text-red">${d.losses}</div><div class="lbl">Losses</div></div>
          <div class="deck-stat"><div class="val text-muted">${d.draws}</div><div class="lbl">Draws</div></div>
          <div class="deck-stat"><div class="val text-accent">${wr}%</div><div class="lbl">Win Rate</div></div>
          <div class="deck-stat"><div class="val text-blue">${avgElixir}</div><div class="lbl">Avg Elixir</div></div>
        </div>
        <div class="progress-wrap winrate-bar"><div class="progress-bar" style="width:${wr}%;background:var(--green)"></div></div>
        <div class="deck-row">${cardChips}</div>
        <div class="mt8">
          <button class="btn btn-secondary btn-sm" onclick="copyDeckLink('${esc(names)}', this)">📋 Copy Cards</button>
        </div>
      </div>`;
  }).join('');

  return `<div class="filter-bar">${modeButtons}</div>${items}`;
}

window.setDeckFilter = function(mode) {
  _deckFilter = mode;
  if (window._deckMapData && window._deckBattles) {
    document.getElementById('tab-decks').innerHTML = _renderDeckList(window._deckMapData, window._deckBattles);
  }
};

window.copyDeckLink = function(names, btn) {
  navigator.clipboard.writeText(names).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
};

function countryFlag(code) {

let _clanMembers = [];
let _clanSort = 'trophies';

async function loadClan() {
  const raw = document.getElementById('clan-tag').value.trim();
  if (!raw) return;
  const tag = raw.startsWith('#') ? raw : '#' + raw;
  const el = document.getElementById('clan-result');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await apiGet('/clans/' + encodeURIComponent(tag));
    renderClan(data);
  } catch(e) {
    el.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

window.setClanSort = function(by) {
  _clanSort = by;
  renderMembers(_clanMembers);
};

function renderMembers(members) {
  const sorted = [...members];
  if (_clanSort === 'trophies') sorted.sort((a,b) => (b.trophies||0) - (a.trophies||0));
  else if (_clanSort === 'donations') sorted.sort((a,b) => (b.donations||0) - (a.donations||0));
  else if (_clanSort === 'lastseen') {
    // lastSeen is a lexicographically-sortable timestamp; most recent first
    sorted.sort((a,b) => (b.lastSeen||'').localeCompare(a.lastSeen||''));
  } else sorted.sort((a,b) => (a.clanRank||99) - (b.clanRank||99));

  const roleLabel = { leader:'👑 Leader', coLeader:'⭐ Co-Leader', elder:'🔰 Elder', member:'Member' };
  const html = sorted.map((m,i) => {
    // Rank movement arrow (previousClanRank vs clanRank; 0 = new this season)
    let move = '';
    const prev = m.previousClanRank || 0, cur = m.clanRank || 0;
    if (prev === 0) move = '<span style="color:var(--blue)" title="New">●</span>';
    else if (prev > cur) move = `<span style="color:var(--green)" title="Up ${prev-cur}">▲</span>`;
    else if (prev < cur) move = `<span style="color:var(--red)" title="Down ${cur-prev}">▼</span>`;
    else move = '<span style="color:var(--muted)">–</span>';
    const seen = formatBattleTime(m.lastSeen);
    return `
    <div class="member-item">
      <div>
        <div class="member-name"><span style="color:var(--muted);font-size:12px">#${cur}</span> ${move} ${esc(m.name)}</div>
        <div class="member-role">${roleLabel[m.role]||m.role} · ${m.tag}</div>
        ${seen ? `<div style="color:var(--muted);font-size:11px;margin-top:2px">🕓 ${seen}</div>` : ''}
      </div>
      <div class="member-stats">
        <div>🏆 ${fmtNum(m.trophies)}</div>
        <div style="color:var(--muted);font-size:12px">${fmtNum(m.donations)} donations</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('clan-members-list').innerHTML = html;
}

//  INIT
// ═══════════════════════════════════════════════
initApiKey();
calcUpdate();
// Restore last-used player tag into the input
const _savedTag = localStorage.getItem('cr_player_tag');
if (_savedTag) document.getElementById('player-tag').value = _savedTag;

// Register service worker for PWA (standalone fullscreen install)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
